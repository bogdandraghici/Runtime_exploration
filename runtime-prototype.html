// Doc banner with sessionStorage-backed dismissal
function docBanner(title, body, id) {
  if (STATE.dismissedBanners.has(id)) return '';
  return `<div class="doc-banner" data-banner-id="${id}">
    <i class="ph ph-info banner-icon" aria-hidden="true"></i>
    <div><b>${escapeHtml(title)}</b> ${escapeHtml(body)}</div>
    <button class="x" onclick="dismissBanner('${id}'); this.parentElement.remove();">×</button>
  </div>`;
}
function dismissBanner(id) {
  STATE.dismissedBanners.add(id);
  sessionStorage.setItem('dismissedBanners', JSON.stringify([...STATE.dismissedBanners]));
}
function renderIncidentDetail(it, tabIdx) {
  const hasStackTrace = !!it.stackTrace;
  const tabs = ['Context'];
  if (hasStackTrace) tabs.push('Stack trace');
  tabs.push('Timeline');
  tabs.push('Similar');

  const stageLabel = { 'pre-start': 'Pre-start', 'trigger': 'Trigger', 'mid-execution': 'Mid-execution', 'ai-quality': 'AI quality' };
  const sevLabel = { critical: 'Critical', high: 'High', medium: 'Medium', low: 'Low' };

  const head = `
    <div class="topline">
      <span class="crumb">Incident</span>
      <span style="color:var(--border-strong)">/</span>
      <span style="font-family:'JetBrains Mono',monospace">${escapeHtml(it.id)}</span>
      <button class="x" onclick="closeDetail()">×</button>
    </div>
    <h3>${escapeHtml(it.title)}</h3>
    <div class="sub">${escapeHtml(stageLabel[it.stage])} · raised ${escapeHtml(it.when)}${it.rootCause.recurrence > 1 ? ` · ${it.rootCause.recurrence} occurrences` : ''}</div>
    <div class="meta-row">
      <span class="inc-status ${it.status}"><span class="dot"></span>${it.status === 'ack' ? 'Ack' : it.status.charAt(0).toUpperCase() + it.status.slice(1)}</span>
      ${buildChip(it.buildTag)}
      <span style="color:var(--text-dim);font-size:11px">Severity: ${sevLabel[it.severity]}</span>
    </div>
    <div class="actions">
      ${it.status === 'open' ? `<button class="btn primary" onclick="mutateIncident('${it.id}','ack')">Acknowledge</button>` : ''}
      ${it.status !== 'resolved' ? `<button class="btn ghost" onclick="mutateIncident('${it.id}','assign')">Assign to me</button>` : ''}
      ${it.status !== 'resolved' ? `<button class="btn ghost" onclick="mutateIncident('${it.id}','resolved')">Resolve</button>` : ''}
    </div>`;

  const tabsHtml = tabs.map((t, i) => `<button class="tab ${i === tabIdx ? 'active' : ''}" onclick="STATE.detail.tab = ${i}; renderDetail();">${t}</button>`).join('');

  const active = tabs[tabIdx];
  let body = '';
  if (active === 'Context') {
    body = `
      ${docBanner('About this incident.', `A "${stageLabel[it.stage]}" incident means ${stageHelpText(it.stage)}.`, `inc-stage-${it.stage}`)}
      <div class="panel-block">
        ${panelHeading('Root cause', null)}
        <div class="kv">
          ${Object.entries(it.rootCause).map(([k, v]) => {
            const label = k.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
            const valHtml = (typeof v === 'string' && k === 'exception') ? `<code style="color:var(--red-700);font-weight:600;font-family:'JetBrains Mono',monospace">${escapeHtml(v)}</code>` :
                            (typeof v === 'string' && k === 'location') ? `<code style="font-family:'JetBrains Mono',monospace">${escapeHtml(v)}</code>` :
                            escapeHtml(String(v));
            return `<span>${escapeHtml(label)}</span><span>${valHtml}</span>`;
          }).join('')}
        </div>
      </div>
      ${it.related.length > 0 ? `<div class="panel-block">
        ${panelHeading('Related entities', null)}
        ${it.related.map(r => `
          <div class="related-card" onclick="openDetail('${r.kind === 'proc' || r.kind === 'flow' ? 'instance' : 'build'}','${r.id}')">
            <div class="ic ${r.kind}">${r.kind === 'proc' ? 'P' : r.kind === 'flow' ? 'F' : '◆'}</div>
            <div class="name">${escapeHtml(r.name)}<small>${escapeHtml(r.id)} · ${escapeHtml(r.meta)}</small></div>
            <div class="arr">→</div>
          </div>
        `).join('')}
      </div>` : ''}
    `;
  } else if (active === 'Stack trace') {
    body = `<div class="panel-block">
      ${panelHeading('Stack trace', null)}
      <div class="stack-trace">${escapeHtml(it.stackTrace || 'No stack trace captured.')}</div>
    </div>`;
  } else if (active === 'Timeline') {
    body = `<div class="panel-block">
      ${panelHeading('Timeline', null)}
      <div class="timeline">
        ${(it.timeline || []).map(tl => `
          <div class="tl-row ${tl.kind === 'bad' ? 'bad' : tl.kind === 'deploy' ? 'deploy' : ''}">
            <div class="when">${escapeHtml(tl.when)}</div>
            <div class="dot"></div>
            <div class="lbl">${md(tl.label)}</div>
          </div>
        `).join('') || '<div style="font-size:11px;color:var(--text-dim);">No timeline events.</div>'}
      </div>
    </div>`;
  } else if (active === 'Similar') {
    body = `<div class="panel-block">
      ${panelHeading('Similar incidents', null)}
      <div style="font-size:11px;color:var(--text-dim);">No similar incidents in this window.</div>
    </div>`;
  }

  return [head, tabsHtml, body];
}

function stageHelpText(stage) {
  return {
    'pre-start': 'a process refused to start (validation, missing input, etc.). Fix the trigger configuration or the calling code',
    'trigger': 'a trigger fired but did not reach a process start. Inspect the trigger configuration and external system',
    'mid-execution': 'a process instance threw while running. The process is paused at the offending node; you can retry, skip, or terminate from the parent instance page',
    'ai-quality': 'an AI scorer crossed its threshold. The Live Evals page is the canonical source for scorer config and history',
  }[stage] || 'something went wrong';
}

function mutateIncident(id, action) {
  const inc = MOCK_DATA.incidents.find(i => i.id === id);
  if (!inc) return;
  if (action === 'ack') inc.status = 'ack';
  else if (action === 'resolved') inc.status = 'resolved';
  else if (action === 'assign') inc.assignedTo = 'me'; // no-op visualization
  renderSidebar();
  renderDetail();
  if (STATE.currentRoute === 'incidents') renderIncidents(document.getElementById('page'));
  if (STATE.currentRoute === 'overview') renderOverview(document.getElementById('page'));
}
function renderBuildDetail(it, tabIdx) {
  const tabs = ['Deployment', 'Comparison', 'Live runs', 'Workflows', 'Changelog'];
  const liveRuns = MOCK_DATA.instances.filter(i => i.buildTag === it.tag);

  const head = `
    <div class="topline">
      <span class="crumb">Build</span>
      <span style="color:var(--border-strong)">/</span>
      <span style="font-family:'JetBrains Mono',monospace">${escapeHtml(it.tag)}</span>
      <button class="x" onclick="closeDetail()">×</button>
    </div>
    <h3>${escapeHtml(it.tag)} ${it.isActive ? '<span style="font-size:11px;color:var(--green-700);margin-left:6px;font-weight:600">● ACTIVE</span>' : ''}</h3>
    <div class="sub">cut from <code style="font-family:'JetBrains Mono',monospace;font-size:11px">${escapeHtml(it.branch)}</code> · ${escapeHtml(it.cutAt)} by ${escapeHtml(it.cutBy)} · ${it.isArchived ? 'archived' : 'live'}</div>
    <div class="actions">
      <button class="btn primary" onclick="alert('Comparison flow — pick a build to compare')">Compare to…</button>
      <button class="btn ghost" onclick="location.hash='#/live-evals'">View in Live Evals</button>
      ${!it.isActive && !it.isArchived ? `<button class="btn ghost" onclick="alert('Rollback flow stub')">Rollback</button>` : ''}
    </div>`;

  const tabsHtml = tabs.map((t, i) => {
    let countHtml = '';
    if (t === 'Live runs') countHtml = `<span class="count">${liveRuns.length}</span>`;
    if (t === 'Workflows') countHtml = `<span class="count">${MOCK_DATA.workflows.length}</span>`;
    return `<button class="tab ${i === tabIdx ? 'active' : ''}" onclick="STATE.detail.tab = ${i}; renderDetail();">${t}${countHtml}</button>`;
  }).join('');

  const active = tabs[tabIdx];
  let body = '';
  if (active === 'Deployment') {
    // Who's serving / who's not
    const policy = MOCK_DATA.policies.build;
    const servedByThis = [];
    if (policy.default.resolvesToTag === it.tag) {
      servedByThis.push({ who: 'Default policy', sub: 'everyone not matched by overrides', percent: it.coverage.percent });
    }
    policy.overrides.forEach(o => {
      if (o.policy.resolvesToTag === it.tag && o.enabled) {
        servedByThis.push({
          who: `${o.target.type}: <code style="font-family:'JetBrains Mono',monospace;font-size:11px">${escapeHtml(o.target.value)}</code>`,
          sub: `override · ${o.policy.type}`,
          percent: 12 // approximated for prototype
        });
      }
    });

    const notServed = MOCK_DATA.builds.filter(b => b.tag !== it.tag && b.coverage.note && b.coverage.note.startsWith('role:'));

    body = `${docBanner("What's a deployment view?", 'Builds are artifacts; deployments are who\'s running them. This tab shows the slice of traffic each policy rule sends to this build.', 'build-deployment')}
      <div class="panel-block">
        ${panelHeading("Who it's serving", 'Active policy')}
        ${servedByThis.length === 0 ? '<div style="font-size:11px;color:var(--text-dim);padding:8px 0;">No policy rule currently targets this build.</div>' :
          servedByThis.map(s => `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border-soft);font-size:12px;">
            <div>${s.who}<small style="display:block;color:var(--text-dim);font-size:10px;">${escapeHtml(s.sub)}</small></div>
            <div style="width:80px;height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 10px;"><i style="display:block;background:var(--blue-500);height:100%;width:${Math.min(100, s.percent + 10)}%"></i></div>
            <div style="font-weight:700;color:var(--blue-700);font-variant-numeric:tabular-nums;">${s.percent}%</div>
          </div>`).join('')}
        <div style="font-size:11px;color:var(--text-dim);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);">
          <strong style="color:var(--text-muted);">Not on this build:</strong> ${notServed.length ? notServed.map(b => `${escapeHtml(b.coverage.note.replace('role: ', ''))} role → ${escapeHtml(b.tag)}`).join(' · ') : 'all callers served by this build'}
        </div>
      </div>`;
  } else if (active === 'Comparison') {
    const prev = MOCK_DATA.builds.find(b => b.branch === it.branch && b.tag !== it.tag && !b.isArchived);
    body = `<div class="panel-block">
      ${panelHeading(`Comparison vs ${prev ? prev.tag : '(no previous)'}`, 'Scorer')}
      <div class="cmp-grid">
        <div class="cmp-cell"><div class="k">Throughput</div><div class="v">${it.liveStats.runsLastHour}/h</div><div class="d delta up">↑ +18%</div></div>
        <div class="cmp-cell"><div class="k">p95 latency</div><div class="v">2.8s</div><div class="d delta down">↑ +0.4s</div></div>
        <div class="cmp-cell"><div class="k">Error rate</div><div class="v">0.63%</div><div class="d delta down">↑ +0.21pp</div></div>
      </div>
      <div style="margin-top:10px;">
        <div class="scorer-row"><span>Coherence · Reasoner</span><span class="delta down">▼ -0.06</span></div>
        <div class="scorer-row"><span>Helpfulness · Chat</span><span class="delta up">▲ +0.02</span></div>
        <div class="scorer-row"><span>Toxicity · all nodes</span><span class="delta flat">— flat</span></div>
        <div class="scorer-row"><span>Cost / 1k runs</span><span class="delta down">▲ +$0.42</span></div>
      </div>
    </div>`;
  } else if (active === 'Live runs') {
    body = `<div class="panel-block">
      ${panelHeading('Live runs on this build', null)}
      ${liveRuns.length === 0 ? '<div class="empty"><p>No live runs on this build right now.</p></div>' :
        liveRuns.slice(0, 10).map(r => `
          <div class="related-card" onclick="openDetail('instance','${r.id}')">
            <div class="ic ${r.type === 'process' ? 'proc' : 'flow'}">${r.type === 'process' ? 'P' : 'F'}</div>
            <div class="name">${escapeHtml(r.definitionName)}<small>${escapeHtml(r.id)} · ${escapeHtml(r.status)}</small></div>
            <div class="arr">→</div>
          </div>`).join('')}
      ${liveRuns.length > 10 ? `<div style="text-align:center;margin-top:8px;"><a style="font-size:11px;color:var(--blue-500);font-weight:600;cursor:pointer" onclick="closeDetail(); location.hash='#/instances'">View all ${liveRuns.length} runs →</a></div>` : ''}
    </div>`;
  } else if (active === 'Workflows') {
    body = `<div class="panel-block">
      ${panelHeading('Workflows in this build', null)}
      ${MOCK_DATA.workflows.map(w => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:12px;">
          <div><strong>${escapeHtml(w.name)}</strong><div style="font-size:10px;color:var(--text-dim);">${w.nodes.length} AI node${w.nodes.length === 1 ? '' : 's'}</div></div>
          <a style="font-size:11px;color:var(--blue-500);font-weight:600;cursor:pointer" onclick="STATE.liveEvals.workflowId='${w.id}'; closeDetail(); location.hash='#/live-evals'">Open →</a>
        </div>`).join('')}
    </div>`;
  } else if (active === 'Changelog') {
    body = `<div class="panel-block">
      ${panelHeading('Changes since previous', null)}
      <ul style="font-size:12px;color:var(--text-muted);margin:0;padding-left:20px;line-height:22px;">
        <li>Reasoner prompt updated — added handling for European VAT cases</li>
        <li>New scorer binding: <code style="font-family:'JetBrains Mono',monospace">helpfulness</code> on Responder</li>
        <li>Config: <code style="font-family:'JetBrains Mono',monospace">timeout_ms</code> default increased 20s → 30s</li>
        <li>Process refactor: Document upload retry policy now 3× with jitter</li>
      </ul>
    </div>`;
  }

  return [head, tabsHtml, body];
}
function renderTriggerDetail(it, tab) {
  return [`<div class="topline"><span class="crumb">Trigger</span><span style="font-family:'JetBrains Mono',monospace">${escapeHtml(it.id)}</span><button class="x" onclick="closeDetail()">×</button></div><h3>${escapeHtml(it.name)}</h3><div class="sub">${escapeHtml(it.type)} · ${escapeHtml(it.status)}</div>`, '', '<div class="empty"><p>Detail content coming in Task 8.</p></div>'];
}
function renderTaskDetail(it, tab) {
  return [`<div class="topline"><span class="crumb">Task</span><span style="font-family:'JetBrains Mono',monospace">${escapeHtml(it.id)}</span><button class="x" onclick="closeDetail()">×</button></div><h3>${escapeHtml(it.title)}</h3><div class="sub">From ${escapeHtml(it.source.definitionName)} · ${escapeHtml(it.source.atStep)}</div>`, '', '<div class="empty"><p>Detail content coming in Task 8.</p></div>'];
}

// ============================================================
//  GLOSSARY PANEL
// ============================================================
function openGlossary(scrollToTerm = null) {
  STATE.glossary = { open: true, scrollToTerm };
  document.getElementById('glossaryPanel').classList.add('open');
  renderGlossary('');
  if (scrollToTerm) {
    setTimeout(() => {
      const el = document.querySelector(`[data-term="${scrollToTerm}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }
}
function closeGlossary() {
  STATE.glossary.open = false;
  document.getElementById('glossaryPanel').classList.remove('open');
}
function renderGlossary(filter = '') {
  const q = (filter || '').toLowerCase();
  const terms = Object.entries(MOCK_DATA.glossary)
    .filter(([k, v]) => !q || k.toLowerCase().includes(q) || v.long.toLowerCase().includes(q));
  document.getElementById('glossaryBody').innerHTML = terms.map(([k, v]) =>
    `<div class="glossary-term" data-term="${escapeHtml(k)}"><h4>${escapeHtml(k)}</h4><p>${escapeHtml(v.long)}</p></div>`
  ).join('') || '<div class="empty"><p>No terms match.</p></div>';
}

// ============================================================
//  HELP POPOVER
// ============================================================
let popoverOpenTerm = null;
function showHelpPopover(ev, term) {
  ev.stopPropagation();
  const def = MOCK_DATA.glossary[term];
  if (!def) return;
  const pop = document.getElementById('helpPopover');
  popoverOpenTerm = term;
  pop.innerHTML = `<h5>${escapeHtml(term)}</h5><p>${escapeHtml(def.short)}</p><a onclick="openGlossary('${escapeHtml(term)}'); document.getElementById('helpPopover').classList.remove('open');">Open glossary →</a>`;
  const rect = ev.target.getBoundingClientRect();
  pop.style.top = (rect.bottom + 8) + 'px';
  pop.style.left = Math.max(8, rect.left - 60) + 'px';
  pop.classList.add('open');
}
document.addEventListener('click', (ev) => {
  if (!ev.target.closest('.help-popover') && !ev.target.classList.contains('help-icon-inline')) {
    document.getElementById('helpPopover').classList.remove('open');
  }
  // Close glossary on outside click only via button
});

// ============================================================
//  ACTIVITY SIMULATOR
// ============================================================
const SYNTHETIC_EVENTS = [
  { type: 'start', title: '**Process started** — Document validation', sub: '{pill}inst_new{id}{pill} · batch processing · {pill}v1.4.2{pill}', linkKind: 'instance' },
  { type: 'finish', title: '**12 instances finished** in last 30s', sub: 'avg latency 1.9s · 11 success · 1 errored', linkKind: null },
  { type: 'start', title: '**UI Flow session** started — Customer feedback', sub: '{pill}sess_new{id}{pill} · running on {pill}v1.4.2{pill}', linkKind: 'instance' },
  { type: 'trigger', title: '**Scheduled trigger fired** — Hourly KPI rollup', sub: 'spawned 1 process instance', linkKind: 'trigger' },
  { type: 'finish', title: '**8 instances finished** in last 30s', sub: 'avg latency 2.1s · all success', linkKind: null },
  { type: 'start', title: '**Process started** — Notification dispatch', sub: '{pill}inst_new{id}{pill} · running on {pill}v1.4.2{pill}', linkKind: 'instance' },
];

let synthIdx = 0;
let lastIdNum = 100;

function simulateActivity() {
  const tpl = SYNTHETIC_EVENTS[synthIdx % SYNTHETIC_EVENTS.length];
  synthIdx++;
  lastIdNum++;
  const evId = 'ev_sim_' + lastIdNum;
  const newEv = {
    id: evId,
    when: 'just now',
    whenSec: 0,
    type: tpl.type,
    title: tpl.title.replace(/\{id\}/g, lastIdNum),
    sub: tpl.sub.replace(/\{id\}/g, lastIdNum),
    linkKind: tpl.linkKind,
    linkId: null,
  };

  // Re-time existing events ("just now" → "1m ago" → "2m ago"… simplified)
  MOCK_DATA.activityEvents.forEach(e => {
    if (e.when === 'just now') e.when = '1m ago';
    e.whenSec = (e.whenSec || 0) + 30;
  });
  MOCK_DATA.activityEvents.unshift(newEv);
  if (MOCK_DATA.activityEvents.length > 40) MOCK_DATA.activityEvents.pop();

  STATE.recentEventId = evId;

  if (STATE.currentRoute === 'overview') renderOverview(document.getElementById('page'));
  renderSidebar();

  // Clear recent marker after one render so animation only triggers once
  setTimeout(() => { STATE.recentEventId = null; }, 400);
}

// Kick off simulator after initial render (every 7s)
setInterval(simulateActivity, 7000);

// Press Escape to close detail panel or glossary
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') {
    if (STATE.glossary.open) closeGlossary();
    else if (STATE.detail.open) closeDetail();
  }
});

// Click outside glossary closes it (but not when clicking the panel itself)
document.getElementById('glossaryPanel').addEventListener('click', (ev) => ev.stopPropagation());

// ============================================================
//  INIT
// ============================================================
renderSidebar();
router();
</script>

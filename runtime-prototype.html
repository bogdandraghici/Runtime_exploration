            <td><code style="font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(op.nodeName)}</code></td>
            <td><span style="font-variant-numeric:tabular-nums;font-weight:600;">${op.uniqueValuesSeen.length}</span> <span style="font-size:10px;color:var(--text-dim);">(${op.uniqueValuesSeen.map(v => escapeHtml(v)).join(', ')})</span></td>
            <td><button class="toggle ${op.enabled ? '' : 'off'}" onclick="toggleObservationPoint('${op.id}')"><span class="switch"></span>${op.enabled ? 'On' : 'Off'}</button></td>
            <td style="text-align:right;"><a style="color:var(--blue-500);cursor:pointer;font-size:11px;font-weight:600;margin-right:8px">Edit</a><a style="color:var(--red-700);cursor:pointer;font-size:11px;font-weight:600;">Delete</a></td>
          </tr>`).join('')}
        </tbody>
      </table>`;

  const settingsBody = `
      ${docBanner("What's on Settings?", "Scorer bindings attach quality scorers to nodes or workflows; observation points mark categorical decision dimensions that become filters on the Overview tab.", 'le-settings-howto')}
      <div class="le-tier">
        <h4>Scorer bindings <span class="pill-mini optin">${wf.scorers.length}</span></h4>
        <div class="descr">Scorers attached to this workflow or to its AI nodes. Each binding has its own sample rate, daily token budget, and threshold.</div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><button class="btn ghost" style="padding:4px 10px;font-size:11px;" onclick="alert('Add binding flow — coming soon')">+ New binding</button></div>
        ${bindingsHtml}
      </div>

      <div class="le-tier">
        <h4>Observation points <span class="pill-mini scope">${opsAll.length}</span></h4>
        <div class="descr">Designer-marked decision dimensions. Enabled observation points become filter chips at the top of the Overview tab.</div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><button class="btn ghost" style="padding:4px 10px;font-size:11px;" onclick="alert('Add observation point flow — coming soon')">+ New observation point</button></div>
        ${obsHtml}
      </div>
  `;

  root.innerHTML = `
    <div class="page-head">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:11px;color:var(--text-muted);">
          <a style="color:var(--text-muted);cursor:pointer;text-decoration:none;" onclick="location.hash='#/live-evals'">← Live Evals</a>
        </span>
        <div style="display:flex;align-items:center;gap:8px;">
          <h2 style="margin:0;">${escapeHtml(wf.name)}</h2>
          ${helpIcon('Live Evals')}
          ${breachedCount > 0 ? `<span style="display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:9999px;background:var(--red-50);color:var(--red-700);font-size:11px;font-weight:700;border:1px solid var(--red-100);"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red-500);"></span>${breachedCount} scorer${breachedCount === 1 ? '' : 's'} breached</span>` : ''}
        </div>
      </div>
      <span class="sub">${escapeHtml(wf.nodes.length)} AI node${wf.nodes.length === 1 ? '' : 's'} · ${wf.scorers.length} scorer${wf.scorers.length === 1 ? '' : 's'} bound · ${opsForWf.length} observation point${opsForWf.length === 1 ? '' : 's'}</span>
      <span class="meta">active build: <strong>${escapeHtml(wf.activeBuild)}</strong> · <a style="color:var(--blue-500);cursor:pointer;font-weight:600;" onclick="jumpToBuildComparison('${wfId}')">Compare builds →</a> · <a style="color:var(--blue-500);cursor:pointer;font-weight:600;" onclick="location.hash='#/live-evals/runs'">View all runs →</a></span>
    </div>
    <div class="page-section">
      <div class="stage-tabs">
        <button class="stage-tab ${tab === 'overview' ? 'active' : ''}" onclick="STATE.liveEvals.tab='overview'; renderLiveEvalsWorkflow(document.getElementById('page'))">Overview</button>
        <button class="stage-tab ${tab === 'settings' ? 'active' : ''}" onclick="STATE.liveEvals.tab='settings'; renderLiveEvalsWorkflow(document.getElementById('page'))">Settings <span class="count">${wf.scorers.length + opsForWf.length}</span></button>
      </div>
      <div class="filter-bar">
        <span style="font-size:12px;line-height:16px;color:var(--flowx-text-secondary);margin-right:4px;">Time:</span>
        ${['1h','24h','7d','custom'].map(tw => `<button class="chip ${STATE.liveEvals.timeWindow === tw ? 'active' : ''}" onclick="setLiveEvalsTimeWindow('${tw}')">${tw === 'custom' ? 'Custom' : tw}</button>`).join('')}
        ${tab === 'overview' && opsForWf.length > 0 ? `
          <span style="margin-left:16px;font-size:12px;line-height:16px;color:var(--flowx-text-secondary);margin-right:4px;">Decisions:</span>
          ${opsForWf.map(op => {
            const sel = STATE.liveEvals.decisions[op.id] || '';
            const isActive = !!sel;
            return `<button class="chip ${isActive ? 'active' : ''}" onclick="cycleDecisionFilter('${op.id}')" title="Click to cycle · values: all, ${escapeHtml(op.uniqueValuesSeen.join(', '))}">
              <span style="color:var(--text-dim);font-weight:400;margin-right:2px;">${escapeHtml(op.dimensionLabel)}:</span>${escapeHtml(sel || 'all')}
            </button>`;
          }).join('')}
          ${activeDecisionCount > 0 ? `<button class="chip" style="margin-left:8px;color:var(--text-muted);" onclick="clearDecisionFilters()" title="Clear all decision filters">Clear ${activeDecisionCount}</button>` : ''}
          <span style="margin-left:auto;font-size:11px;line-height:16px;color:var(--text-dim);">${activeDecisionCount > 0 ? `<span style="color:var(--blue-700);font-weight:600;">${activeDecisionCount} filter${activeDecisionCount === 1 ? '' : 's'} active</span> · data below reflects the slice` : 'No decision filters'}</span>
        ` : ''}
      </div>
    </div>
    <div class="page-body">
      ${tab === 'overview' ? overviewBody : settingsBody}
    </div>
  `;
}

function renderBuildComparison(root, wfId, leftId, rightId) {
  const wf = MOCK_DATA.workflows.find(w => w.id === wfId);
  const left = MOCK_DATA.builds.find(b => b.id === leftId);
  const right = MOCK_DATA.builds.find(b => b.id === rightId);
  const incompatible = left.isArchived || right.isArchived;

  // Synthetic scorer/metric values for non-active builds (deterministic seed by build cutAtHours + name)
  const seed = (name, hours) => {
    let h = 0;
    for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) % 997;
    return ((h + Math.round(hours)) % 100) / 100; // 0..1
  };
  function scorerValueOn(scorer, build) {
    if (build.isArchived) return null;
    if (build.isActive) return scorer.value;
    const drift = (seed(scorer.name, build.cutAtHours) - 0.5) * 0.18; // ±0.09
    return Math.max(0, Math.min(1, scorer.value - drift));
  }
  function aggregateOn(build) {
    if (build.isActive) return { ...wf.telemetry };
    const driftPct = (seed('agg', build.cutAtHours) - 0.5) * 0.3; // ±15%
    return {
      throughput: Math.round(wf.telemetry.throughput * (1 - driftPct)),
      p95: +(wf.telemetry.p95 * (1 - driftPct * 0.6)).toFixed(2),
      cost: Math.round(wf.telemetry.cost * (1 - driftPct)),
      errorRate: +(Math.max(0, wf.telemetry.errorRate - driftPct * 0.4)).toFixed(2),
      instanceCount: Math.round(wf.telemetry.instanceCount * (1 - driftPct)),
      meanPathLength: +(wf.telemetry.meanPathLength + (seed('mpl', build.cutAtHours) - 0.5) * 0.4).toFixed(1),
      retryPressurePct: +(Math.max(0, wf.telemetry.retryPressurePct + (seed('rp', build.cutAtHours) - 0.5) * 4)).toFixed(1),
      fallbackModelPct: +(Math.max(0, wf.telemetry.fallbackModelPct + (seed('fb', build.cutAtHours) - 0.5) * 2)).toFixed(1),
    };
  }
  function nodeLatencyOn(nodeName, build) {
    // Approximate base latency per node from invocations
    const invs = MOCK_DATA.workflowRuns
      .filter(r => r.workflowId === wf.id)
      .flatMap(r => r.invocations.filter(i => i.nodeName === nodeName));
    const baseLat = invs.length ? invs.reduce((s, i) => s + i.latencyMs, 0) / invs.length : 800;
    const baseCost = invs.length ? invs.reduce((s, i) => s + i.costUsd, 0) / invs.length : 0.005;
    if (build.isActive) return { latencyMs: Math.round(baseLat), costUsd: +baseCost.toFixed(3) };
    const drift = (seed(nodeName, build.cutAtHours) - 0.5) * 0.25;
    return { latencyMs: Math.round(baseLat * (1 - drift)), costUsd: +(baseCost * (1 - drift)).toFixed(3) };
  }
  function decisionDistOn(op, build) {
    return op.uniqueValuesSeen.map((v, i, all) => {
      const baseShare = 100 / all.length;
      const skew = (seed(v + (build.isActive ? 'active' : 'past'), build.cutAtHours) - 0.5) * 30;
      return { value: v, pct: Math.max(2, baseShare + skew) };
    }).reduce((acc, row, _, arr) => {
      // Normalize to 100
      const sum = arr.reduce((s, r) => s + r.pct, 0);
      acc.push({ value: row.value, pct: Math.round((row.pct / sum) * 100) });
      return acc;
    }, []);
  }

  const deltaPill = (delta, options = {}) => {
    const { suffix = '', invertColor = false, fmt = (d) => (d > 0 ? '+' : '') + d.toFixed(2) } = options;
    if (Math.abs(delta) < 0.001) return `<span class="delta flat">— flat</span>`;
    const dir = delta > 0 ? 'up' : 'down';
    const color = invertColor ? (dir === 'up' ? 'down' : 'up') : dir;
    return `<span class="delta ${color}">${dir === 'up' ? '↑' : '↓'} ${fmt(delta)}${suffix}</span>`;
  };

  const head = `
    <div class="page-head">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:11px;color:var(--text-muted);">
          <a style="color:var(--text-muted);cursor:pointer;text-decoration:none;" onclick="location.hash='#/live-evals/${wfId}'">← ${escapeHtml(wf.name)}</a>
        </span>
        <div style="display:flex;align-items:center;gap:8px;">
          <h2 style="margin:0;">Build comparison</h2>
          ${helpIcon('Build')}
        </div>
      </div>
      <span class="sub">Per-scorer, per-AI-node, and decision-distribution deltas between two builds of <strong>${escapeHtml(wf.name)}</strong>.</span>
    </div>
    <div class="page-section">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:stretch;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;">
        <div>
          <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;margin-bottom:6px;">Left build</div>
          <select class="build-picker" onchange="setComparisonBuild('left', this.value)" style="width:100%;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:6px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text);">
            ${MOCK_DATA.builds.map(b => `<option value="${b.id}" ${b.id === leftId ? 'selected' : ''}>${escapeHtml(b.tag)} · ${escapeHtml(b.branch)} · ${escapeHtml(b.cutAt)}${b.isActive ? ' · active' : ''}${b.isArchived ? ' · archived' : ''}</option>`).join('')}
          </select>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">cut ${escapeHtml(left.cutAt)} by ${escapeHtml(left.cutBy)} · branch <code style="font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(left.branch)}</code></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;">
          <button class="btn ghost" style="padding:6px 12px;font-size:11px;height:fit-content;align-self:center;" onclick="swapComparisonBuilds()" title="Swap left and right">⇄ Swap</button>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;margin-bottom:6px;">Right build</div>
          <select class="build-picker" onchange="setComparisonBuild('right', this.value)" style="width:100%;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:6px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text);">
            ${MOCK_DATA.builds.map(b => `<option value="${b.id}" ${b.id === rightId ? 'selected' : ''}>${escapeHtml(b.tag)} · ${escapeHtml(b.branch)} · ${escapeHtml(b.cutAt)}${b.isActive ? ' · active' : ''}${b.isArchived ? ' · archived' : ''}</option>`).join('')}
          </select>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">cut ${escapeHtml(right.cutAt)} by ${escapeHtml(right.cutBy)} · branch <code style="font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(right.branch)}</code></div>
        </div>
      </div>
    </div>
  `;

  if (incompatible) {
    root.innerHTML = `${head}
      <div class="page-body">
        <div style="background:var(--bg);border:1px solid var(--orange-100);border-left:4px solid var(--orange-500);border-radius:8px;padding:20px 24px;display:flex;gap:16px;align-items:flex-start;">
          <div style="font-size:24px;flex-shrink:0;">⚠</div>
          <div>
            <h3 style="margin:0 0 6px;font-size:16px;color:var(--orange-700);">Incompatible — no shared scorer history</h3>
            <p style="margin:0 0 8px;font-size:13px;color:var(--text-muted);line-height:20px;">${escapeHtml(left.tag)} and ${escapeHtml(right.tag)} don't share scorer definitions, so quality deltas can't be computed. ${left.isArchived || right.isArchived ? 'Archived builds predate the current scorer set.' : ''}</p>
            <p style="margin:0;font-size:12px;color:var(--text-dim);">Try comparing two non-archived builds on the same branch.</p>
          </div>
        </div>
      </div>
    `;
    return;
  }

  // Compute snapshots
  const aggL = aggregateOn(left);
  const aggR = aggregateOn(right);

  const aggRows = [
    { k: 'Throughput', l: aggL.throughput, r: aggR.throughput, suffix: '/h', fmt: (n) => n.toLocaleString(), deltaFmt: (d) => (d > 0 ? '+' : '') + Math.round(d).toLocaleString(), invert: false },
    { k: 'p95 latency', l: aggL.p95, r: aggR.p95, suffix: 's', fmt: (n) => n + 's', deltaFmt: (d) => (d > 0 ? '+' : '') + d.toFixed(2) + 's', invert: true },
    { k: 'Cost / hr', l: aggL.cost, r: aggR.cost, suffix: '', fmt: (n) => '$' + n, deltaFmt: (d) => (d > 0 ? '+' : '') + '$' + Math.round(d), invert: true },
    { k: 'Error rate', l: aggL.errorRate, r: aggR.errorRate, suffix: '%', fmt: (n) => n + '%', deltaFmt: (d) => (d > 0 ? '+' : '') + d.toFixed(2) + 'pp', invert: true },
    { k: 'Instances', l: aggL.instanceCount, r: aggR.instanceCount, suffix: '', fmt: (n) => n.toLocaleString(), deltaFmt: (d) => (d > 0 ? '+' : '') + Math.round(d).toLocaleString(), invert: false },
    { k: 'Mean path length', l: aggL.meanPathLength, r: aggR.meanPathLength, suffix: '', fmt: (n) => n.toFixed(1), deltaFmt: (d) => (d > 0 ? '+' : '') + d.toFixed(1), invert: false },
    { k: 'Retry pressure', l: aggL.retryPressurePct, r: aggR.retryPressurePct, suffix: '%', fmt: (n) => n.toFixed(1) + '%', deltaFmt: (d) => (d > 0 ? '+' : '') + d.toFixed(1) + 'pp', invert: true },
    { k: 'Fallback model', l: aggL.fallbackModelPct, r: aggR.fallbackModelPct, suffix: '%', fmt: (n) => n.toFixed(1) + '%', deltaFmt: (d) => (d > 0 ? '+' : '') + d.toFixed(1) + 'pp', invert: true },
  ];

  const aggHtml = `<div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg);">
    <div style="display:contents;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;">
      <div style="padding:8px 12px;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);">Metric</div>
      <div style="padding:8px 12px;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);text-align:right;">${escapeHtml(left.tag)}</div>
      <div style="padding:8px 12px;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);text-align:right;">${escapeHtml(right.tag)}</div>
      <div style="padding:8px 12px;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);text-align:right;">Δ</div>
    </div>
    ${aggRows.map(row => {
      const delta = row.l - row.r;
      const flat = Math.abs(delta) < 0.001 || (typeof row.l === 'number' && typeof row.r === 'number' && Math.abs(row.l - row.r) < 0.01 && row.k !== 'Cost / hr');
      const dir = delta > 0 ? 'up' : 'down';
      const color = row.invert ? (dir === 'up' ? 'down' : 'up') : dir;
      return `<div style="padding:10px 12px;border-top:1px solid var(--border-soft);font-size:13px;font-weight:600;">${row.k}</div>
        <div style="padding:10px 12px;border-top:1px solid var(--border-soft);font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">${row.fmt(row.l)}</div>
        <div style="padding:10px 12px;border-top:1px solid var(--border-soft);font-size:13px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted);">${row.fmt(row.r)}</div>
        <div style="padding:10px 12px;border-top:1px solid var(--border-soft);text-align:right;">${flat ? '<span class="delta flat">flat</span>' : `<span class="delta ${color}">${dir === 'up' ? '↑' : '↓'} ${row.deltaFmt(delta)}</span>`}</div>`;
    }).join('')}
  </div>`;

  // Per-scorer
  const scorerRows = wf.scorers.map(s => {
    const lv = scorerValueOn(s, left);
    const rv = scorerValueOn(s, right);
    const delta = lv - rv;
    // For toxicity-like (low is good, threshold low) — higher = bad
    const lowIsGood = s.threshold < 0.5;
    const dir = delta > 0 ? 'up' : 'down';
    const color = lowIsGood ? (dir === 'up' ? 'down' : 'up') : dir;
    const regression = lowIsGood ? (lv > rv && lv > s.threshold) : (lv < rv && lv < s.threshold);
    const flat = Math.abs(delta) < 0.001;
    return `<div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:0;padding:0;border-bottom:1px solid var(--border-soft);">
      <div style="padding:10px 12px;font-size:13px;">
        <strong>${escapeHtml(s.name)}</strong>
        <div style="font-size:10px;color:var(--text-dim);">on ${escapeHtml(s.node)} · threshold ${s.threshold.toFixed(2)}</div>
      </div>
      <div style="padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;color:${lowIsGood ? (lv > s.threshold ? 'var(--red-700)' : 'var(--green-700)') : (lv < s.threshold ? 'var(--red-700)' : 'var(--green-700)')};">${lv.toFixed(2)}</div>
      <div style="padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted);">${rv.toFixed(2)}</div>
      <div style="padding:10px 12px;text-align:right;">${flat ? '<span class="delta flat">flat</span>' : `<span class="delta ${color}">${dir === 'up' ? '↑' : '↓'} ${(delta > 0 ? '+' : '') + delta.toFixed(2)}</span>${regression ? ' <span style="font-size:10px;color:var(--red-700);font-weight:700;">⚠ regression</span>' : ''}`}</div>
    </div>`;
  }).join('');

  const scorerHtml = wf.scorers.length === 0
    ? `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;font-size:11px;color:var(--text-dim);text-align:center;">No scorers bound to this workflow.</div>`
    : `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;">
        <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:0;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;">
          <div style="padding:8px 12px;">Scorer</div>
          <div style="padding:8px 12px;text-align:right;">${escapeHtml(left.tag)}</div>
          <div style="padding:8px 12px;text-align:right;">${escapeHtml(right.tag)}</div>
          <div style="padding:8px 12px;text-align:right;">Δ</div>
        </div>
        ${scorerRows}
      </div>`;

  // Per-node latency / cost
  const nodeRows = wf.nodes.map(n => {
    const l = nodeLatencyOn(n.name, left);
    const r = nodeLatencyOn(n.name, right);
    const latDelta = l.latencyMs - r.latencyMs;
    const costDelta = l.costUsd - r.costUsd;
    const latDir = latDelta > 0 ? 'up' : 'down';
    const latColor = latDir === 'up' ? 'down' : 'up'; // higher latency = bad
    const costDir = costDelta > 0 ? 'up' : 'down';
    const costColor = costDir === 'up' ? 'down' : 'up';
    return `<div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:0;padding:0;border-bottom:1px solid var(--border-soft);">
      <div style="padding:10px 12px;font-size:13px;">
        <strong>${escapeHtml(n.name)}</strong>
        <div style="font-size:10px;color:var(--text-dim);">${escapeHtml(n.type)}</div>
      </div>
      <div style="padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:12px;">${l.latencyMs}ms<div style="font-size:10px;color:var(--text-dim);">$${l.costUsd.toFixed(3)}</div></div>
      <div style="padding:10px 12px;text-align:right;font-variant-numeric:tabular-nums;font-size:12px;color:var(--text-muted);">${r.latencyMs}ms<div style="font-size:10px;color:var(--text-dim);">$${r.costUsd.toFixed(3)}</div></div>
      <div style="padding:10px 12px;text-align:right;font-size:11px;">
        ${Math.abs(latDelta) < 5 ? '<span class="delta flat">flat lat</span>' : `<span class="delta ${latColor}">${latDir === 'up' ? '↑' : '↓'} ${latDelta > 0 ? '+' : ''}${latDelta}ms</span>`}
        <div style="margin-top:2px;">${Math.abs(costDelta) < 0.001 ? '<span class="delta flat">flat $</span>' : `<span class="delta ${costColor}">${costDir === 'up' ? '↑' : '↓'} ${costDelta > 0 ? '+' : ''}$${costDelta.toFixed(3)}</span>`}</div>
      </div>
    </div>`;
  }).join('');

  const nodeHtml = `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;">
    <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:0;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.04em;font-weight:700;">
      <div style="padding:8px 12px;">Node</div>
      <div style="padding:8px 12px;text-align:right;">${escapeHtml(left.tag)}</div>
      <div style="padding:8px 12px;text-align:right;">${escapeHtml(right.tag)}</div>
      <div style="padding:8px 12px;text-align:right;">Δ</div>
    </div>
    ${nodeRows}
  </div>`;

  // Decision distributions per observation point
  const opsForWf = MOCK_DATA.observationPoints.filter(op => op.workflowId === wf.id && op.enabled);
  const decisionHtml = opsForWf.length === 0
    ? `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;font-size:11px;color:var(--text-dim);text-align:center;">No observation points defined for this workflow. Add some in <a style="color:var(--blue-500);cursor:pointer;font-weight:600;" onclick="STATE.liveEvals.tab='settings'; location.hash='#/live-evals/${wfId}'">Settings</a> to see decision-distribution shifts here.</div>`
    : opsForWf.map(op => {
        const distL = decisionDistOn(op, left);
        const distR = decisionDistOn(op, right);
        return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px;">
          <div style="padding:10px 14px;background:var(--bg-alt);border-bottom:1px solid var(--border-strong);">
            <strong style="font-family:'JetBrains Mono',monospace;font-size:12px;">${escapeHtml(op.dimensionLabel)}</strong>
            <span style="font-size:10px;color:var(--text-dim);margin-left:8px;">${escapeHtml(op.category)} · on ${escapeHtml(op.nodeName)}</span>
          </div>
          <div style="padding:10px 14px;">
            ${op.uniqueValuesSeen.map(v => {
              const lp = (distL.find(d => d.value === v) || { pct: 0 }).pct;
              const rp = (distR.find(d => d.value === v) || { pct: 0 }).pct;
              const delta = lp - rp;
              const flat = Math.abs(delta) < 1;
              const dir = delta > 0 ? 'up' : 'down';
              return `<div style="display:grid;grid-template-columns:140px 1fr 1fr 70px;align-items:center;gap:10px;font-size:12px;margin-bottom:6px;">
                <div style="font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(v)}</div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div style="flex:1;height:8px;background:var(--bg-alt);border-radius:3px;overflow:hidden;"><div style="width:${lp}%;height:100%;background:var(--blue-500);"></div></div>
                  <span style="width:36px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;">${lp}%</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div style="flex:1;height:8px;background:var(--bg-alt);border-radius:3px;overflow:hidden;"><div style="width:${rp}%;height:100%;background:var(--text-dim);"></div></div>
                  <span style="width:36px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:var(--text-muted);">${rp}%</span>
                </div>
                <div style="text-align:right;font-size:11px;">${flat ? '<span class="delta flat">flat</span>' : `<span class="delta ${dir}">${dir === 'up' ? '↑' : '↓'} ${delta > 0 ? '+' : ''}${delta}pp</span>`}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');

  root.innerHTML = `${head}
    <div class="page-body">
      ${docBanner("What's a build comparison?", "Side-by-side metrics, scorer values, per-AI-node latency/cost, and decision-distribution shifts between two builds. Use after a deploy to spot regressions; left is conventionally the newer build.", 'build-comparison-howto')}

      <div class="le-tier">
        <h4>Aggregate</h4>
        <div class="descr">Overall workflow telemetry, build-over-build.</div>
        ${aggHtml}
      </div>

      <div class="le-tier">
        <h4>Per-scorer <span class="pill-mini optin">${wf.scorers.length}</span></h4>
        <div class="descr">Scorer values on each build. Regression flag fires when the active-build value crosses its threshold.</div>
        ${scorerHtml}
      </div>

      <div class="le-tier">
        <h4>Per-AI-node <span class="pill-mini scope">${wf.nodes.length}</span></h4>
        <div class="descr">Latency and cost shifts per node. Higher latency / higher cost render red; lower renders green.</div>
        ${nodeHtml}
      </div>

      <div class="le-tier">
        <h4>Decision-distribution shifts <span class="pill-mini scope">${opsForWf.length}</span></h4>
        <div class="descr">For each observation point, percentage of runs landing on each value, build-over-build.</div>
        ${decisionHtml}
      </div>
    </div>
  `;
}

function renderTriggers(root) {
  const tab = STATE.filters.triggers.tab;

  const fires = MOCK_DATA.triggerFires;
  const counts = {
    scheduled: triggers.filter(t => t.type === 'cron').length,
    external: triggers.filter(t => t.type !== 'cron').length,
    'recent-fires': fires.length,
    'failed-fires': fires.filter(f => f.outcome === 'failed').length,
  };

  const tabLabel = { scheduled: 'Scheduled', external: 'External', 'recent-fires': 'Recent fires', 'failed-fires': 'Failed fires' };

  let bodyHtml = '';
  if (tab === 'scheduled' || tab === 'external') {
    const rows = tab === 'scheduled' ? triggers.filter(t => t.type === 'cron') : triggers.filter(t => t.type !== 'cron');
    bodyHtml = `
      <table class="list-table">
        <thead><tr>
          <th>Name</th><th>Type</th><th>Schedule</th><th>Spawns</th><th>Last fire</th><th>Status</th>
        </tr></thead>
        <tbody>
          ${rows.map(t => `<tr class="${t.status === 'erroring' ? 'anchor' : ''}" onclick="openDetail('trigger','${t.id}')">
            <td><strong>${escapeHtml(t.name)}</strong></td>
            <td style="text-transform:capitalize">${escapeHtml(t.type)}</td>
            <td class="mono">${escapeHtml(t.schedule)}</td>
            <td><span class="pill">${escapeHtml(t.spawns)}</span></td>
            <td style="color:var(--text-muted);font-size:11px;">${escapeHtml(t.lastFire)}</td>
            <td>${triggerStatusPill(t)}<button class="btn ghost" style="margin-left:8px;padding:3px 8px;font-size:11px;" onclick="event.stopPropagation(); toggleTrigger('${t.id}')">${t.status === 'paused' ? 'Resume' : 'Pause'}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } else if (tab === 'recent-fires' || tab === 'failed-fires') {
    const rows = tab === 'recent-fires' ? fires : fires.filter(f => f.outcome === 'failed');
    bodyHtml = `
      <table class="list-table">
        <thead><tr>
          <th>Trigger</th><th>Type</th><th>Fired at</th><th>Outcome</th><th>${tab === 'failed-fires' ? 'Failure reason' : 'Spawned'}</th>
        </tr></thead>
        <tbody>
          ${rows.map(f => `<tr onclick="openDetail('trigger','${f.triggerId}')">
            <td><strong>${escapeHtml(f.triggerName)}</strong></td>
            <td style="text-transform:capitalize">${escapeHtml(f.triggerType)}</td>
            <td style="color:var(--text-muted);font-size:11px;">${escapeHtml(f.firedAt)}</td>
            <td>${f.outcome === 'success' ? '<span style="color:var(--green-700);font-weight:600;font-size:11px;">Success</span>' : '<span style="color:var(--red-700);font-weight:600;font-size:11px;">Failed</span>'}</td>
            <td>${f.outcome === 'success' ? (f.spawnedInstanceId ? `<a class="mono" style="color:var(--blue-500);cursor:pointer" onclick="event.stopPropagation(); openDetail('instance','${f.spawnedInstanceId}')">${escapeHtml(f.spawnedInstanceId)}</a>` : '<span style="color:var(--text-dim)">—</span>') : `<span style="color:var(--red-700);font-size:11px">${escapeHtml(f.failureReason)}</span>`}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  root.innerHTML = `
    <div class="page-head">
      <h2>Schedules & Triggers</h2>
      ${helpIcon('Trigger')}
      <span class="sub">Scheduled processes + external triggers + their failure history.</span>
      <span class="meta">${counts.scheduled} scheduled · ${counts.external} external · ${counts['failed-fires']} failed</span>
    </div>
    <div class="page-body" style="padding-bottom:0;">
      ${docBanner("What's combined here.", "Old Scheduled Processes + old Manage Triggers + the trigger-failure subset of Failed Triggers. Mid-execution / Pre-start failures live in Incidents. The 'Failed fires' tab here is just for fires that didn't reach a process start.", 'triggers-howto')}
    </div>
    <div class="page-section">
      <div class="stage-tabs">
        ${['scheduled','external','recent-fires','failed-fires'].map(t => `
          <button class="stage-tab ${tab === t ? 'active' : ''}" onclick="STATE.filters.triggers.tab='${t}'; renderTriggers(document.getElementById('page'))">
            ${tabLabel[t]} <span class="count ${t === 'failed-fires' && counts[t] > 0 ? 'alert' : ''}">${counts[t]}</span>
          </button>`).join('')}
      </div>
      ${bodyHtml}
    </div>
  `;
}

function triggerStatusPill(t) {
  if (t.status === 'active') return '<span class="state-pill state-running"><span class="dot"></span>Active</span>';
  if (t.status === 'paused') return '<span class="state-pill state-completed"><span class="dot"></span>Paused</span>';
  if (t.status === 'erroring') return `<span class="state-pill state-failed"><span class="dot"></span>${t.errorCount24h} failure${t.errorCount24h === 1 ? '' : 's'}</span>`;
  return `<span class="state-pill state-completed"><span class="dot"></span>${escapeHtml(t.status)}</span>`;
}
function toggleTrigger(id) {
  const t = MOCK_DATA.triggers.find(x => x.id === id);
  if (!t) return;
  if (t.status === 'active') t.status = 'paused';
  else if (t.status === 'paused') t.status = 'active';
  renderTriggers(document.getElementById('page'));
}
function renderTasks(root) {
  const f = STATE.filters.tasks;
  let rows = MOCK_DATA.tasks.slice();
  if (f.status === 'pending') rows = rows.filter(t => !t.completed);
  if (f.status === 'completed') rows = rows.filter(t => t.completed);
  if (f.assignee === 'me') rows = rows.filter(t => t.assignee && t.assignee.userId === 'me');
  if (f.assignee === 'unassigned') rows = rows.filter(t => !t.assignee);

  const pendingCount = MOCK_DATA.tasks.filter(t => !t.completed).length;

  const rowsHtml = rows.map(t => {
    const avatar = t.assignee ? `<div class="who" style="${t.assignee.userId === 'me' ? '' : 'background:var(--purple-500)'}">${escapeHtml(t.assignee.displayName)}</div>` : '<div class="who unas">?</div>';
    const dueClass = t.isOverdue ? 'overdue' : (t.dueAt && t.dueAt.includes('in 4h') ? 'soon' : '');
    const action = t.completed ? '<span style="font-size:11px;color:var(--text-dim)">Done</span>'
      : !t.assignee ? `<button class="btn primary" onclick="event.stopPropagation(); claimTask('${t.id}')">Claim</button>`
      : (t.assignee.userId === 'me' ? `<button class="btn primary">Open</button>` : `<button class="btn ghost">View</button>`);
    return `<div class="task-row" onclick="openDetail('task','${t.id}')">
      ${avatar}
      <div>
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="src">from <a class="mono" style="color:var(--blue-500);cursor:pointer" onclick="event.stopPropagation(); openDetail('instance','${t.source.instanceId}')">${escapeHtml(t.source.instanceId)}</a> · ${escapeHtml(t.source.definitionName)} · ${escapeHtml(t.source.atStep)}</div>
      </div>
      <div class="due ${dueClass}">${escapeHtml(t.dueAt)}</div>
      ${action}
    </div>`;
  }).join('');

  root.innerHTML = `
    <div class="page-head">
      <h2>Tasks</h2>
      ${helpIcon('Task')}
      <span class="sub">User-task inbox. Tasks are created by Process Instances reaching a human-task node.</span>
      <span class="meta">${pendingCount} pending</span>
    </div>
    <div class="page-section">
      <div class="filter-bar">
        <div class="pickr ${f.assignee !== 'anyone' ? 'active' : ''}" onclick="cycleFilter('tasks','assignee', ['anyone','me','unassigned'])">Assignee <span class="v">${f.assignee.charAt(0).toUpperCase() + f.assignee.slice(1)}</span></div>
        <div class="pickr ${f.status !== 'pending' ? 'active' : ''}" onclick="cycleFilter('tasks','status', ['pending','completed','all'])">Status <span class="v">${f.status.charAt(0).toUpperCase() + f.status.slice(1)}</span></div>
        <div class="pickr"><span>Due</span><span class="v">All</span></div>
      </div>
      ${rows.length === 0 ? '<div class="empty"><h4>No tasks match these filters</h4><p>Clear filters or try a different assignee.</p></div>' : rowsHtml}
    </div>
  `;
}

function claimTask(id) {
  const t = MOCK_DATA.tasks.find(x => x.id === id);
  if (!t) return;
  t.assignee = { userId: 'me', displayName: 'AB' };
  renderTasks(document.getElementById('page'));
}
function cycleFilter(page, key, options) {
  const cur = STATE.filters[page][key];
  const i = options.indexOf(cur);
  STATE.filters[page][key] = options[(i + 1) % options.length];
  ROUTES[page](document.getElementById('page'));
}

// ============================================================
//  DETAIL PANEL
// ============================================================
function openDetail(kind, id) {
  STATE.detail = { open: true, kind, id, tab: 0 };
  renderDetail();
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail() {
  STATE.detail = { open: false, kind: null, id: null, tab: 0 };
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', closeDetail);

function renderDetail() {
  // Initial placeholder until specific detail renderers are added in later tasks
  const { kind, id, tab } = STATE.detail;
  let head = '', tabs = '', body = '';

  if (kind === 'instance') {
    const it = MOCK_DATA.instances.find(x => x.id === id);
    if (it) [head, tabs, body] = renderInstanceDetail(it, tab);
  } else if (kind === 'incident') {
    const it = MOCK_DATA.incidents.find(x => x.id === id);
    if (it) [head, tabs, body] = renderIncidentDetail(it, tab);
  } else if (kind === 'build') {
    const it = MOCK_DATA.builds.find(x => x.id === id);
    if (it) [head, tabs, body] = renderBuildDetail(it, tab);
  } else if (kind === 'trigger') {
    const it = MOCK_DATA.triggers.find(x => x.id === id);
    if (it) [head, tabs, body] = renderTriggerDetail(it, tab);
  } else if (kind === 'task') {
    const it = MOCK_DATA.tasks.find(x => x.id === id);
    if (it) [head, tabs, body] = renderTaskDetail(it, tab);
  } else if (kind === 'workflowRun') {
    const it = MOCK_DATA.workflowRuns.find(x => x.id === id);
    if (it) [head, tabs, body] = renderWorkflowRunDetail(it, tab);
  } else if (kind === 'aiNode') {
    const [wfId, nodeName] = id.split(':');
    const wf = MOCK_DATA.workflows.find(w => w.id === wfId);
    const node = wf ? wf.nodes.find(n => n.name === nodeName) : null;
    if (node) [head, tabs, body] = renderAiNodeDetail({ ...node, workflowId: wfId, workflowName: wf.name }, tab);
  }

  if (!head) {
    head = `<div class="topline"><span class="crumb">Detail</span><button class="x" onclick="closeDetail()">×</button></div><h3>Not found</h3><div class="sub">Entity ${kind}:${id} not in the prototype data.</div>`;
    tabs = '';
    body = '<div class="empty"><h4>Coming soon</h4><p>This entity type isn\'t wired in this prototype yet.</p></div>';
  }
  document.getElementById('detailHead').innerHTML = head;
  document.getElementById('detailTabs').innerHTML = tabs;
  document.getElementById('detailBody').innerHTML = body;
}

function renderInitiator(init) {
  if (!init) return '<span style="color:var(--text-muted)">—</span>';
  const kindLabels = { manual: 'Manual', cron: 'Cron', webhook: 'Webhook', process: 'Process', uiflow: 'UI Flow' };
  const kindIcons = { manual: '👤', cron: '⏱', webhook: '↘', process: '▸', uiflow: '◆' };
  const label = kindLabels[init.kind] || init.kind;
  const icon = kindIcons[init.kind] || '·';
  let body = '';
  if (init.triggerId && init.triggerName) {
    body = `<a style="color:var(--blue-500);cursor:pointer;" onclick="openDetail('trigger','${escapeHtml(init.triggerId)}')">${escapeHtml(init.triggerName)}</a>`;
  } else if (init.parentId) {
    body = `<a style="color:var(--blue-500);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;" onclick="openDetail('instance','${escapeHtml(init.parentId)}')">${escapeHtml(init.parentId)}</a>`;
  } else if (init.userId) {
    body = `<code style="font-family:'JetBrains Mono',monospace;font-size:11px;">${escapeHtml(init.userId)}</code>`;
  } else if (init.triggerName) {
    body = escapeHtml(init.triggerName);
  } else {
    body = '<span style="color:var(--text-muted)">—</span>';
  }
  const when = init.when ? `<span style="color:var(--text-dim);font-size:11px;margin-left:6px;">${escapeHtml(init.when)}</span>` : '';

function renderActivityTree(it) {
  const subprocessesHtml = renderSubprocessTree(it.subprocesses);
  if (it.type === 'uiflow') {

        ${panelHeading('Activity tree', 'UI Flow Session')}

          <span style="color:var(--purple-500)">◆</span>

          <span class="pos">${it.status}</span>
        </div>
        ${subprocessesHtml || '<div style="font-size:11px;color:var(--text-dim);padding:8px 10px;">This session hasn\'t spawned any processes yet.</div>'}
      </div>`;
  }
  // Process: tokens + subprocesses
  return `${docBanner("What's an Activity tree?", "For processes, this shows active tokens (where execution pointers are right now) and any spawned sub-processes.", 'inst-activity-tree-p')}
    <div class="panel-block">
      ${panelHeading('Active tokens', 'Token')}
      <div class="tree-node ${it.status === 'failed' ? 'bad' : ''}">
        <span style="color:var(--green-500)">▸</span>
        <span class="lbl"><strong>${escapeHtml(it.definitionName)}</strong> · ${escapeHtml(it.atStep)}</span>
        <span class="pos">${it.status}${it.activeIncidentCount ? ` · ${it.activeIncidentCount} incidents` : ''}</span>
      </div>
    </div>
    <div class="panel-block">
      ${panelHeading('Subprocesses', null)}
      ${subprocessesHtml || '<div style="font-size:11px;color:var(--text-dim);padding:8px 10px;">This instance hasn\'t spawned any subprocesses.</div>'}
    </div>`;
}

function renderSubprocessTree(subs, seen) {
  if (!subs || !subs.length) return '';
  seen = seen || new Set();
  return subs.filter(s => !seen.has(s.id)).map(s => {
    seen.add(s.id);
    const glyphColor = s.type === 'uiflow' ? 'var(--purple-500)' : 'var(--green-500)';
    const glyph = s.type === 'uiflow' ? '◆' : '▸';
    // Look up the full instance to recurse on its own subprocesses (if present)
    const full = MOCK_DATA.instances.find(x => x.id === s.id);
    const nested = full && full.subprocesses ? renderSubprocessTree(full.subprocesses, seen) : '';
    return `<div class="tree-child">
      <div class="tree-node ${s.status === 'failed' ? 'bad' : ''}" onclick="openDetail('instance','${escapeHtml(s.id)}')" style="cursor:pointer;">
        <span style="color:${glyphColor}">${glyph}</span>
        <span class="lbl"><strong>${escapeHtml(s.definitionName)}</strong> · <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);">${escapeHtml(s.id)}</span> · ${escapeHtml(s.atStep)}</span>
        <span class="pos">${escapeHtml(s.status)}</span>
      </div>
      ${nested}
    </div>`;
  }).join('');
}

function renderAiRunsSlice(it) {

  const runs = MOCK_DATA.workflowRuns.filter(r => r.spawnedBy.id === it.id);

        <span>${runs.length} run${runs.length === 1 ? '' : 's'} spawned by this ${it.type === 'process' ? 'process instance' : 'UI flow session'}</span>

        </div>`;
      }).join('')}

}

function stageHelpText(stage) {
  return {
    'pre-start': 'a process refused to start (validation, missing input, etc.). Fix the trigger configuration or the calling code',
    'trigger': 'a trigger fired but did not reach a process start. Inspect the trigger configuration and external system',
    'mid-execution': 'a process instance threw while running. The process is paused at the offending node; you can retry, skip, or terminate from the parent instance page',
    'ai-quality': 'an AI scorer crossed its threshold. The Live Evals page is the canonical source for scorer config and history',
  }[stage] || 'something went wrong';
}

function mutateIncident(id, action) {
  const inc = MOCK_DATA.incidents.find(i => i.id === id);
  if (!inc) return;
  if (action === 'ack') inc.status = 'ack';
  else if (action === 'resolved') inc.status = 'resolved';
  else if (action === 'assign') inc.assignedTo = 'me'; // no-op visualization
  renderSidebar();
  renderDetail();
  if (STATE.currentRoute === 'incidents') renderIncidents(document.getElementById('page'));
  if (STATE.currentRoute === 'overview') renderOverview(document.getElementById('page'));
}

function openGlossary(scrollToTerm = null) {
  STATE.glossary = { open: true, scrollToTerm };
  document.getElementById('glossaryPanel').classList.add('open');
  renderGlossary('');
  if (scrollToTerm) {
    setTimeout(() => {
      const el = document.querySelector(`[data-term="${scrollToTerm}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }
}
function closeGlossary() {
  STATE.glossary.open = false;
  document.getElementById('glossaryPanel').classList.remove('open');
}
function renderGlossary(filter = '') {
  const q = (filter || '').toLowerCase();
  const terms = Object.entries(MOCK_DATA.glossary)
    .filter(([k, v]) => !q || k.toLowerCase().includes(q) || v.long.toLowerCase().includes(q));
  document.getElementById('glossaryBody').innerHTML = terms.map(([k, v]) =>
    `<div class="glossary-term" data-term="${escapeHtml(k)}"><h4>${escapeHtml(k)}</h4><p>${escapeHtml(v.long)}</p></div>`
  ).join('') || '<div class="empty"><p>No terms match.</p></div>';
}

  popoverOpenTerm = term;
  if (def) {
    pop.innerHTML = `<h5>${escapeHtml(term)}</h5><p>${escapeHtml(def.short)}</p><a onclick="openGlossary('${escapeHtml(term)}'); document.getElementById('helpPopover').classList.remove('open');">Open glossary →</a>`;
  } else {
    // Fallback so the popover never shows stale content from a previous term
    pop.innerHTML = `<h5>${escapeHtml(term)}</h5><p style="color:var(--flowx-text-secondary);">No definition yet for this term.</p><a onclick="openGlossary(); document.getElementById('helpPopover').classList.remove('open');">Open glossary →</a>`;
  }
  const rect = ev.target.getBoundingClientRect();
  pop.style.top = (rect.bottom + 8) + 'px';
  pop.style.left = Math.max(8, rect.left - 60) + 'px';
  pop.classList.add('open');
}
document.addEventListener('click', (ev) => {
  if (!ev.target.closest('.help-popover') && !ev.target.classList.contains('help-icon-inline')) {
    document.getElementById('helpPopover').classList.remove('open');
  }
  // Close glossary on outside click only via button
});

// ============================================================
//  ACTIVITY SIMULATOR
// ============================================================
const SYNTHETIC_EVENTS = [
  { type: 'start', title: '**Process started** — Document validation', sub: '{pill}inst_new{id}{pill} · batch processing · {pill}v1.4.2{pill}', linkKind: 'instance' },
  { type: 'finish', title: '**12 instances finished** in last 30s', sub: 'avg latency 1.9s · 11 success · 1 errored', linkKind: null },
  { type: 'start', title: '**UI Flow session** started — Customer feedback', sub: '{pill}sess_new{id}{pill} · running on {pill}v1.4.2{pill}', linkKind: 'instance' },
  { type: 'trigger', title: '**Scheduled trigger fired** — Hourly KPI rollup', sub: 'spawned 1 process instance', linkKind: 'trigger' },
  { type: 'finish', title: '**8 instances finished** in last 30s', sub: 'avg latency 2.1s · all success', linkKind: null },
  { type: 'start', title: '**Process started** — Notification dispatch', sub: '{pill}inst_new{id}{pill} · running on {pill}v1.4.2{pill}', linkKind: 'instance' },
];

let synthIdx = 0;
let lastIdNum = 100;

function simulateActivity() {
  const tpl = SYNTHETIC_EVENTS[synthIdx % SYNTHETIC_EVENTS.length];
  synthIdx++;
  lastIdNum++;
  const evId = 'ev_sim_' + lastIdNum;
  const newEv = {
    id: evId,
    when: 'just now',
    whenSec: 0,
    type: tpl.type,
    title: tpl.title.replace(/\{id\}/g, lastIdNum),
    sub: tpl.sub.replace(/\{id\}/g, lastIdNum),
    linkKind: tpl.linkKind,
    linkId: null,
  };

  // Re-time existing events ("just now" → "1m ago" → "2m ago"… simplified)
  MOCK_DATA.activityEvents.forEach(e => {
    if (e.when === 'just now') e.when = '1m ago';
    e.whenSec = (e.whenSec || 0) + 30;
  });
  MOCK_DATA.activityEvents.unshift(newEv);
  if (MOCK_DATA.activityEvents.length > 40) MOCK_DATA.activityEvents.pop();

  STATE.recentEventId = evId;

  if (STATE.currentRoute === 'overview') renderOverview(document.getElementById('page'));
  renderSidebar();

  // Clear recent marker after one render so animation only triggers once
  setTimeout(() => { STATE.recentEventId = null; }, 400);
}

// Kick off simulator after initial render (every 7s)
setInterval(simulateActivity, 7000);

// Press Escape to close detail panel or glossary
document.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') {
    if (STATE.glossary.open) closeGlossary();
    else if (STATE.detail.open) closeDetail();
  }
});

// Click outside glossary closes it (but not when clicking the panel itself)
document.getElementById('glossaryPanel').addEventListener('click', (ev) => ev.stopPropagation());

// ============================================================
//  INIT
// ============================================================
renderSidebar();
router();
</script>

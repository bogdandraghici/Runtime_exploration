<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowX Designer — Runtime (prototype)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
:root {
  /* ─── FlowX Design System foundations ─────────────────────────── */
  /* Palettes */
  --flowx-blue-50:#e6f0fb; --flowx-blue-100:#b0d1f3; --flowx-blue-200:#8abbed; --flowx-blue-300:#549ce5; --flowx-blue-400:#3389e0; --flowx-blue-500:#006bd8; --flowx-blue-600:#005fc0; --flowx-blue-700:#004c99; --flowx-blue-800:#003b77; --flowx-blue-900:#002d5b;
  --flowx-green-50:#e6f2ef; --flowx-green-100:#b0d8ce; --flowx-green-200:#8ac5b6; --flowx-green-300:#54aa94; --flowx-green-400:#339980; --flowx-green-500:#008060; --flowx-green-600:#007457; --flowx-green-700:#005b44; --flowx-green-800:#004635; --flowx-green-900:#003628;
  --flowx-yellow-50:#fff8e7; --flowx-yellow-100:#ffe9b6; --flowx-yellow-200:#ffdf92; --flowx-yellow-300:#fed061; --flowx-yellow-400:#fec742; --flowx-yellow-500:#feb913; --flowx-yellow-600:#e7a811; --flowx-yellow-700:#b4830d; --flowx-yellow-800:#8c660a; --flowx-yellow-900:#6b4e08;
  --flowx-orange-50:#fff0e8; --flowx-orange-100:#fed1b9; --flowx-orange-200:#febb97; --flowx-orange-300:#fe9c67; --flowx-orange-400:#fd8949; --flowx-orange-500:#fd6b1c; --flowx-orange-600:#e66119; --flowx-orange-700:#b44c14; --flowx-orange-800:#8b3b0f; --flowx-orange-900:#6a2d0c;
  --flowx-red-50:#fde9e6; --flowx-red-100:#f7bab0; --flowx-red-200:#f4998a; --flowx-red-300:#ee6b54; --flowx-red-400:#eb4e33; --flowx-red-500:#e62200; --flowx-red-600:#d11f00; --flowx-red-700:#a31800; --flowx-red-800:#7f1300; --flowx-red-900:#610e00;
  --flowx-neutrals-50:#f7f8f9; --flowx-neutrals-100:#e3e8ed; --flowx-neutrals-200:#cbd1db; --flowx-neutrals-300:#a6b0be; --flowx-neutrals-400:#8390a2; --flowx-neutrals-500:#64748b; --flowx-neutrals-600:#5b6a7e; --flowx-neutrals-700:#475263; --flowx-neutrals-800:#2a313a; --flowx-neutrals-900:#1d232c;
  --flowx-white:#ffffff; --flowx-black:#000000;

  /* Semantic (light) */
  --flowx-surface-primary: var(--flowx-white);
  --flowx-surface-secondary: var(--flowx-neutrals-50);
  --flowx-surface-tertiary: var(--flowx-neutrals-100);
  --flowx-text-primary: var(--flowx-neutrals-900);
  --flowx-text-secondary: var(--flowx-neutrals-500);
  --flowx-text-disabled: var(--flowx-neutrals-300);
  --flowx-border-default: var(--flowx-neutrals-100);
  --flowx-border-strong: var(--flowx-neutrals-200);
  --flowx-interactive: var(--flowx-blue-500);
  --flowx-interactive-hover: var(--flowx-blue-600);
  --flowx-success: var(--flowx-green-500);
  --flowx-warning: var(--flowx-yellow-500);
  --flowx-error: var(--flowx-red-500);
  --flowx-info: var(--flowx-blue-500);

  /* Spacing scale (px) */
  --flowx-space-0: 0; --flowx-space-1: 1px; --flowx-space-2: 2px; --flowx-space-4: 4px; --flowx-space-6: 6px; --flowx-space-8: 8px; --flowx-space-12: 12px; --flowx-space-16: 16px; --flowx-space-24: 24px; --flowx-space-32: 32px; --flowx-space-40: 40px; --flowx-space-48: 48px; --flowx-space-56: 56px; --flowx-space-64: 64px;

  /* Radius scale */
  --flowx-radius-2: 2px; --flowx-radius-4: 4px; --flowx-radius-6: 6px; --flowx-radius-8: 8px; --flowx-radius-12: 12px; --flowx-radius-16: 16px; --flowx-radius-24: 24px;
  --flowx-radius-pill: 9999px;

  /* Elevation (FlowX shadow color #163462 @ 10%) */
  --flowx-shadow-xs: 0 2px 8px #1634621a;
  --flowx-shadow-s:  0 4px 12px #1634621a;
  --flowx-shadow-m:  0 8px 16px #1634621a;
  --flowx-shadow-l:  0 16px 24px #1634621a;
  --flowx-shadow-xl: 0 24px 32px #1634621a;

  /* ─── Local aliases mapped to FlowX foundations ────────────────── */
  --bg: var(--flowx-surface-primary);
  --bg-alt: var(--flowx-surface-secondary);
  --bg-soft: #fafbfc;
  --border: var(--flowx-border-default);
  --border-soft: #f0f3f6;
  --border-strong: var(--flowx-border-strong);
  --text: var(--flowx-text-primary);
  --text-muted: var(--flowx-neutrals-600);
  --text-dim: var(--flowx-neutrals-400);

  --blue-50: var(--flowx-blue-50);   --blue-100: var(--flowx-blue-100);   --blue-500: var(--flowx-blue-500);   --blue-700: var(--flowx-blue-700);
  --green-50: var(--flowx-green-50); --green-100: var(--flowx-green-100); --green-500: var(--flowx-green-500); --green-700: var(--flowx-green-700);
  --yellow-50: var(--flowx-yellow-50); --yellow-100: var(--flowx-yellow-100); --yellow-500: var(--flowx-yellow-500); --yellow-700: var(--flowx-yellow-700);
  --orange-50: var(--flowx-orange-50); --orange-100: var(--flowx-orange-100); --orange-500: var(--flowx-orange-500); --orange-700: var(--flowx-orange-700);
  --red-50: var(--flowx-red-50);     --red-100: var(--flowx-red-100);     --red-500: var(--flowx-red-500);     --red-700: var(--flowx-red-700);

  /* FlowX has no purple — map all purple usages onto FlowX blue (info/interactive). */
  --purple-50: var(--flowx-blue-50); --purple-100: var(--flowx-blue-100); --purple-500: var(--flowx-blue-500); --purple-700: var(--flowx-blue-700);

  --shadow-s: var(--flowx-shadow-xs);
  --shadow-m: var(--flowx-shadow-m);
  --shadow-l: var(--flowx-shadow-l);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; line-height: 1.45;
  color: var(--text);
  background: var(--bg-alt);
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; }
a { color: inherit; }

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}
/* AppHeader — matches Agent-Builder-5.0 Figma 11552:314342 */
.app-bar {
  background: var(--flowx-neutrals-800);
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  color: var(--flowx-white);
}
.app-bar .brand-mark {
  width: 18.467px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-left: 4px;
}
.app-bar .brand-mark img {
  width: 100%;
  height: 100%;
  display: block;
}
.app-bar .brand-project {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding-left: 20px;
  height: 100%;
}
.app-bar .brand-project .project-icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.app-bar .brand-project .project-icon img {
  width: 100%;
  height: 100%;
  display: block;
}
.app-bar .brand-project .project-label {
  display: inline-flex;
  align-items: center;
  font-family: 'Open Sans', sans-serif;
  font-size: 14px;
  line-height: 22px;
  font-weight: 400;
  color: var(--flowx-white);
  white-space: nowrap;
}
.app-bar .brand-project .project-label strong { font-weight: 700; }

/* Segmented control on the right */
.app-bar .app-segmented {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 32px;
  padding: 4px;
  background: #191d23;
  border-radius: var(--flowx-radius-8);
}
.app-bar .app-seg {
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  border-radius: var(--flowx-radius-6);
  background: transparent;
  border: none;
  color: var(--flowx-white);
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  line-height: 18px;
  font-weight: 400;
  cursor: pointer;
  text-decoration: none;
  transition: background 100ms ease;
}
.app-bar .app-seg:hover { background: rgba(255,255,255,0.06); }
.app-bar .app-seg.active {
  background: var(--flowx-blue-500);
  font-weight: 600;
  border-radius: var(--flowx-radius-4);
  padding: 0 16px;
  box-shadow: 0 2px 8px -2px rgba(0,0,0,0.08), 0 1px 4px -1px rgba(0,0,0,0.12);
}

.shell {
  display: grid;
  grid-template-columns: 224px 1fr;
  min-height: 0;
}
@media (max-width: 760px) {
  .shell { grid-template-columns: 56px 1fr; }
}

/* ============ SIDEBAR — matches CORE-5.5 Figma 10413:43856 ============ */
.sidebar {
  background: var(--flowx-surface-primary);
  border-right: 1px solid var(--flowx-neutrals-100);
  padding: 24px 8px 40px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
/* Parent row ("menu_category") — bold 14/24, 24px icon, white bg, 6px radius */
.nav-parent {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 16px;
  border-radius: var(--flowx-radius-6);
  font-family: 'Open Sans', sans-serif;
  font-size: 14px;
  line-height: 24px;
  font-weight: 600;
  color: var(--flowx-neutrals-800);
  background: var(--flowx-surface-primary);
  border: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease;
}
.nav-parent.no-route { cursor: default; }
.nav-parent.no-route:hover { background: var(--flowx-surface-primary); }
.nav-parent:hover { background: var(--flowx-surface-secondary); }
.nav-parent.parent-active {
  background: var(--flowx-blue-50);
  color: var(--flowx-blue-500);
}
.nav-parent.parent-active .glyph { color: var(--flowx-blue-500); }
.nav-parent .content {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.nav-parent .glyph {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--flowx-neutrals-500);
  font-size: 24px;
  line-height: 1;
  flex-shrink: 0;
}
.nav-parent .glyph .ph { font-size: 24px; }
.nav-parent .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Children wrapper — indents the subcategory block 40px from the parent */
.nav-children {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 40px;
  padding-bottom: 4px;
  width: 100%;
}

/* Child row ("menu_subcateg") — 28px tall, 12/16 regular */
.nav-child {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  height: 28px;
  padding: 4px 16px 4px 8px;
  border-radius: var(--flowx-radius-6);
  font-family: 'Open Sans', sans-serif;
  font-size: 12px;
  line-height: 16px;
  font-weight: 400;
  color: var(--flowx-neutrals-800);
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease;
}
.nav-child:hover { background: var(--flowx-surface-secondary); }
.nav-child.active {
  background: var(--flowx-blue-50);
  color: var(--flowx-blue-500);
  border-radius: 10px;
  font-weight: 600;
}
.nav-child .label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.nav-badge {
  font-size: 11px;
  line-height: 16px;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: var(--flowx-radius-pill);
  background: var(--flowx-neutrals-100);
  color: var(--flowx-text-secondary);
  font-variant-numeric: tabular-nums;
  transition: transform 200ms ease;
}
.nav-badge.info  { background: var(--flowx-blue-50);   color: var(--flowx-blue-700); }
.nav-badge.warn  { background: var(--flowx-orange-50); color: var(--flowx-orange-700); }
.nav-badge.alert { background: var(--flowx-red-50);    color: var(--flowx-red-700); animation: pulse-alert 1200ms ease 1; }
@keyframes pulse-alert {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(230,34,0,0.4); }
  60% { transform: scale(1.08); box-shadow: 0 0 0 6px rgba(230,34,0,0); }
  100% { transform: scale(1); }
}
.nav-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--flowx-neutrals-100); }
.nav-help {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-text-secondary);
  border-radius: var(--flowx-radius-8);
  cursor: pointer;
  background: none; border: none; width: 100%; text-align: left;
}
.nav-help:hover { background: var(--flowx-surface-secondary); color: var(--flowx-text-primary); }
.nav-help .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--flowx-green-500);
  box-shadow: 0 0 0 3px rgba(0,128,96,0.15);
}
.nav-help.alert .dot {
  background: var(--flowx-red-500);
  box-shadow: 0 0 0 3px rgba(230,34,0,0.15);
}
@media (max-width: 760px) {
  .nav-parent .label, .nav-children, .nav-badge, .nav-help .text { display: none; }
  .nav-parent { justify-content: center; padding: 8px 4px; }
}

/* ============ MAIN — card-on-canvas rhythm ============ */
.main {
  background: var(--flowx-surface-secondary);
  overflow-y: auto;
  position: relative;
}
/* Page-head sits as a floating "title" card on the gray canvas */
.page-head {
  background: var(--flowx-surface-primary);
  border: none;
  border-radius: var(--flowx-radius-12);
  box-shadow: var(--flowx-shadow-xs);
  padding: 24px;
  margin: 16px 16px 0;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.page-head h2 {
  margin: 0;
  font-size: 24px;
  line-height: 38px;
  font-weight: 700;
  color: var(--flowx-text-primary);
  letter-spacing: -0.01em;
}
.page-head .help-icon, .help-icon-inline {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--flowx-border-default);
  background: var(--flowx-surface-primary);
  color: var(--flowx-text-secondary);
  font-size: 11px; line-height: 16px; text-align: center;
  cursor: help;
  display: inline-block;
  vertical-align: middle;
}
.help-icon-inline { width: 14px; height: 14px; font-size: 9px; line-height: 12px; margin-left: 4px; }
.page-head .sub {
  color: var(--flowx-text-secondary);
  font-size: 14px;
  line-height: 24px;
}
.page-head .meta {
  margin-left: auto;
  color: var(--flowx-text-secondary);
  font-size: 12px;
  line-height: 16px;
}
.page-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
/* Floating content card on the gray canvas (stage-tabs + filter bar + list/table all live inside one) */
.page-section {
  background: var(--flowx-surface-primary);
  border: none;
  border-radius: var(--flowx-radius-12);
  box-shadow: var(--flowx-shadow-xs);
  margin: 16px;
  overflow: hidden;
}
.page-section + .page-section { margin-top: 0; }
/* When a page-head is immediately followed by a page-section, tighten the gap */
.page-head + .page-section { margin-top: 16px; }
/* Filter bar that sits at the top of a page-section (or directly under page-head) */
.filter-bar {
  padding: 16px 24px;
  background: var(--flowx-surface-primary);
  border-bottom: 1px solid var(--flowx-neutrals-100);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

/* ============ COMMON COMPONENTS ============ */

/* Status pills (normalized) */
.state-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: var(--flowx-radius-pill);
  font-size: 12px;
  line-height: 16px;
  font-weight: 600;
  white-space: nowrap;
  position: relative;
}
.state-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.state-running   { background: var(--green-50);  color: var(--green-700); }
.state-running .dot { background: var(--green-500); box-shadow: 0 0 0 3px rgba(0,128,96,0.15); }
.state-waiting   { background: var(--yellow-50); color: var(--yellow-700); }
.state-waiting .dot { background: var(--yellow-500); }
.state-failed    { background: var(--red-50);    color: var(--red-700); }
.state-failed .dot { background: var(--red-500); }
.state-completed { background: var(--border-soft); color: var(--text-muted); }
.state-completed .dot { background: var(--text-dim); }
.state-terminated{ background: var(--border-soft); color: var(--text-muted); }
.state-terminated .dot { background: var(--text-muted); }

/* Build chip */
.build-chip {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
  font-size: 10px;
  padding: 1px 6px;
  border: 1px solid var(--blue-100);
  background: var(--blue-50);
  color: var(--blue-700);
  border-radius: 4px;
}

/* Build chip variants for non-active builds */
.build-chip.muted {
  background: var(--bg-alt);
  border-color: var(--border-strong);
  color: var(--text-muted);
}

/* Generic pill (for stage, severity, etc.) */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.tag-pre { background: var(--red-50); color: var(--red-700); }
.tag-trig { background: var(--yellow-50); color: var(--yellow-700); }
.tag-exec { background: var(--orange-50); color: var(--orange-700); }
.tag-ai { background: var(--purple-50); color: var(--purple-700); }
.tag-merge { background: var(--yellow-50); color: var(--yellow-700); }
.tag-new { background: var(--green-50); color: var(--green-700); }

/* Buttons — FlowX Button (Small): height 28, radius 8, paddingV 6, fontSize 12 / lineHeight 16 / weight 600 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 28px;
  padding: 6px 12px;
  border-radius: var(--flowx-radius-8);
  font-size: 12px;
  line-height: 16px;
  font-weight: 600;
  border: 1px solid var(--flowx-border-default);
  background: var(--flowx-surface-primary);
  color: var(--flowx-text-primary);
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
}
.btn:hover { background: var(--flowx-surface-secondary); }
.btn:active { background: var(--flowx-surface-tertiary); }
/* Brand · Primary */
.btn.primary { background: var(--flowx-blue-500); border-color: var(--flowx-blue-500); color: var(--flowx-white); }
.btn.primary:hover { background: var(--flowx-blue-600); border-color: var(--flowx-blue-600); }
.btn.primary:active { background: var(--flowx-blue-700); border-color: var(--flowx-blue-700); }
/* Brand · Secondary (ghost) */
.btn.ghost { background: var(--flowx-surface-primary); border-color: var(--flowx-border-default); color: var(--flowx-blue-500); }
.btn.ghost:hover { background: var(--flowx-surface-secondary); }
.btn.ghost:active { background: var(--flowx-surface-tertiary); }
/* Danger · Tertiary */
.btn.danger { background: transparent; border-color: transparent; color: var(--flowx-red-500); }
.btn.danger:hover { background: var(--flowx-surface-secondary); }

/* Filter chips — FlowX-styled pill toggle */
.chip {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 12px;
  border-radius: var(--flowx-radius-pill);
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-text-secondary);
  background: var(--flowx-surface-primary);
  border: 1px solid var(--flowx-border-default);
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
}
.chip:hover { background: var(--flowx-surface-secondary); color: var(--flowx-text-primary); }
.chip.active {
  background: var(--flowx-blue-500);
  color: var(--flowx-white);
  border-color: var(--flowx-blue-500);
  font-weight: 600;
}

/* Filter pickers — Secondary-button-flavoured */
.pickr {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--flowx-border-default);
  border-radius: var(--flowx-radius-8);
  background: var(--flowx-surface-primary);
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-text-secondary);
  cursor: pointer;
  transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
}
.pickr:hover { background: var(--flowx-surface-secondary); }
.pickr.active { border-color: var(--flowx-blue-500); color: var(--flowx-blue-700); background: var(--flowx-blue-50); font-weight: 600; }
.pickr .v { color: var(--flowx-text-primary); font-weight: 600; }

/* Search — FlowX Input Field (small): height 28, radius 8, stroke = border-default */
.search {
  display: inline-flex;
  align-items: center;
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--flowx-border-default);
  border-radius: var(--flowx-radius-8);
  background: var(--flowx-surface-primary);
  font-size: 12px;
  line-height: 16px;
  min-width: 200px;
  transition: border-color 100ms ease;
}
.search:hover { border-color: var(--flowx-border-strong); }
.search:focus-within { border-color: var(--flowx-blue-500); }
.search input {
  border: none;
  outline: none;
  width: 100%;
  font: inherit;
  background: transparent;
  color: var(--flowx-text-primary);
}
.search input::placeholder { color: var(--flowx-text-secondary); }

/* Cards — floating surfaces on the gray canvas */
.card {
  background: var(--flowx-surface-primary);
  border: none;
  border-radius: var(--flowx-radius-12);
  overflow: hidden;
  box-shadow: var(--flowx-shadow-xs);
}
.card-head {
  padding: 24px;
  border-bottom: 1px solid var(--flowx-neutrals-100);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.card-head h3 { margin: 0; font-size: 14px; line-height: 24px; font-weight: 700; color: var(--flowx-text-primary); }
.card-head .meta { font-size: 12px; line-height: 16px; color: var(--flowx-text-secondary); }
.card-body { padding: 0; }

/* Banner — surfacing operational state, floats on gray canvas */
.banner {
  border-radius: var(--flowx-radius-12);
  box-shadow: var(--flowx-shadow-xs);
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 0;
}
.banner.alert {
  background: linear-gradient(90deg, var(--flowx-red-50) 0%, var(--flowx-orange-50) 100%);
  border-left: 4px solid var(--flowx-red-500);
}
.banner .icon-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--flowx-red-500);
  box-shadow: 0 0 0 4px rgba(230,34,0,0.15);
  flex-shrink: 0;
}
.banner .lhs { flex: 1; }
.banner .title { font-weight: 700; color: var(--flowx-red-700); font-size: 14px; line-height: 24px; }
.banner .summary { color: var(--flowx-text-secondary); font-size: 12px; line-height: 16px; margin-top: 2px; }

/* Doc banner — informational accent, yellow */
.doc-banner {
  background: var(--flowx-yellow-50);
  border-left: 4px solid var(--flowx-yellow-500);
  padding: 12px;
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-yellow-700);
  border-radius: var(--flowx-radius-8);
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
/* Inside the Configuration card, inset the banner to match the card's 24px rhythm */
.cfg-shell .doc-banner { margin: 24px 24px 12px; }
.doc-banner b { color: var(--text); font-weight: 700; }
.doc-banner .banner-icon {
  font-size: 16px;
  line-height: 16px;
  color: var(--flowx-yellow-700);
  flex-shrink: 0;
  margin-top: 0;
}
.doc-banner .x {
  margin-left: auto;
  cursor: pointer;
  opacity: 0.6;
  background: none;
  border: none;
  color: inherit;
  font-size: 14px;
  padding: 0;
}

/* Tables */
.list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.list-table thead th {
  background: var(--flowx-surface-primary);
  padding: 12px 14px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--flowx-text-secondary);
  font-weight: 700;
  border-bottom: 1px solid var(--flowx-neutrals-100);
  text-align: left;
  white-space: nowrap;
}
.list-table tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-soft);
  vertical-align: middle;
}
.list-table tbody tr {
  cursor: pointer;
  transition: background 60ms ease;
}
.list-table tbody tr:hover { background: var(--bg-alt); }
.list-table tbody tr.selected { background: var(--blue-50); }
.list-table tbody tr.anchor { background: var(--yellow-50); }

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; color: var(--text-muted); }
.pill {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 10px;
  padding: 1px 6px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: var(--flowx-radius-4);
}

/* Detail panel */
.detail-overlay {
  position: fixed;
  inset: 56px 0 0 0;
  background: rgba(29,35,44,0.20);
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease;
  z-index: 100;
}
.detail-overlay.open { opacity: 1; pointer-events: auto; }
.detail-panel {
  position: fixed;
  top: 56px; right: 0; bottom: 0;
  width: 480px;
  background: var(--bg-soft);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-l);
  transform: translateX(100%);
  transition: transform 250ms cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 101;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.detail-panel.open { transform: translateX(0); }
@media (max-width: 760px) {
  .detail-panel { width: 100%; }
}
.detail-head {
  padding: 14px 18px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.detail-head .topline {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-muted);
  margin-bottom: 6px;
}
.detail-head .topline .crumb { color: var(--blue-700); font-weight: 600; }
.detail-head .topline .x {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
}
.detail-head h3 { margin: 0; font-size: 18px; line-height: 28px; font-weight: 700; }
.detail-head .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.detail-head .meta-row {
  margin-top: 10px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.detail-head .actions { display: flex; gap: 8px; margin-top: 12px; }
.detail-tabs {
  display: flex;
  padding: 0 18px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
/* Tabs — FlowX Tabs (small): paddingV 8 paddingH 12, fontSize 12 / lineHeight 16, activeText + 2px bottomStroke blue-500 */
.detail-tabs .tab {
  padding: 8px 12px;
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-neutrals-500);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-weight: 400;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 100ms ease, border-color 100ms ease;
}
.detail-tabs .tab:hover { color: var(--flowx-text-primary); }
.detail-tabs .tab.active {
  color: var(--flowx-blue-500);
  font-weight: 600;
  border-bottom-color: var(--flowx-blue-500);
}
.detail-tabs .tab .count {
  display: inline-block;
  background: var(--flowx-neutrals-100);
  color: var(--flowx-neutrals-500);
  font-size: 10px;
  line-height: 12px;
  padding: 1px 6px;
  border-radius: var(--flowx-radius-pill);
  font-weight: 600;
}
.detail-tabs .tab.active .count { background: var(--flowx-blue-500); color: var(--flowx-white); }
.detail-tabs .tab .count.alert { background: var(--flowx-red-50); color: var(--flowx-red-700); }
.detail-body {
  padding: 16px 18px;
  overflow-y: auto;
  flex: 1;
}
.panel-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.panel-block h4 {
  margin: 0 0 8px;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 700;
}
.kv {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 4px 12px;
  font-size: 12px;
}
.kv > span:nth-child(odd) { color: var(--text-dim); }
.kv > span:nth-child(even) { color: var(--text); }

/* Generic helpers */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 13px;
}
.empty.positive {
  background: var(--flowx-green-50);
  border: none;
  border-radius: var(--flowx-radius-12);
  box-shadow: var(--flowx-shadow-xs);
  color: var(--flowx-green-700);
}
.empty h4 {
  margin: 0 0 4px;
  font-size: 14px;
  color: var(--text);
  font-weight: 700;
}
.empty.positive h4 { color: var(--green-700); }

/* ============ TOOLTIP ============ */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  white-space: nowrap;
  z-index: 200;
  pointer-events: none;
}

/* ============ OVERVIEW ============ */
.ov-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 1000px) { .ov-grid { grid-template-columns: 1fr; } }
.feed-filters {
  background: var(--bg-alt);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.feed-filters .search { margin-left: auto; }
.feed-row {
  display: grid;
  grid-template-columns: 70px 28px 1fr auto;
  align-items: start;
  padding: 10px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  transition: background 60ms ease;
}
.feed-row:hover { background: var(--bg-alt); }
.feed-row.new-row { animation: feed-fade 320ms ease; }
@keyframes feed-fade {
  0% { opacity: 0; transform: translateY(-6px); background: var(--blue-50); }
  100% { opacity: 1; transform: translateY(0); background: var(--bg); }
}
.feed-row .time { color: var(--text-dim); font-size: 11px; font-variant-numeric: tabular-nums; padding-top: 4px; }
.feed-row .glyph {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
}
.glyph-start  { background: var(--green-500); }
.glyph-finish { background: var(--text-muted); }
.glyph-error  { background: var(--red-500); }
.glyph-alert  { background: var(--orange-500); }
.glyph-deploy { background: var(--purple-500); }
.glyph-trigger { background: var(--yellow-500); color: var(--text-muted); }
.feed-row .body .title { font-size: 12px; color: var(--text); }
.feed-row .body .sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.feed-row .actions { color: var(--blue-500); font-size: 11px; font-weight: 600; padding-top: 4px; align-self: center; }
.day-divider {
  padding: 6px 16px;
  background: var(--bg-alt);
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 700;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stack { display: flex; flex-direction: column; gap: 12px; }
.kpi-card { padding: 24px; background: var(--flowx-surface-primary); border: none; border-radius: var(--flowx-radius-12); box-shadow: var(--flowx-shadow-xs); }
.kpi-card h4 { margin: 0 0 8px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
.kpi-big { font-size: 24px; font-weight: 700; color: var(--text); line-height: 28px; font-variant-numeric: tabular-nums; }
.kpi-row { display: flex; gap: 10px; align-items: baseline; }
.kpi-sub { font-size: 11px; color: var(--text-muted); }
.kpi-trend.up { color: var(--green-700); }
.kpi-trend.down { color: var(--red-700); }
.kpi-list { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.kpi-list .row { display: flex; justify-content: space-between; padding: 2px 0; }
.kpi-list .row strong { color: var(--text); }
.build-bar {
  display: flex; height: 8px; border-radius: 9999px; overflow: hidden;
  margin: 8px 0; background: var(--border);
}
.build-bar span { display: block; }
.build-legend { font-size: 10px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 8px; }
.build-legend i { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.scorer-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border-soft); font-size: 11px; }
.scorer-row:last-child { border-bottom: none; }
.scorer-row .delta.up { color: var(--green-700); font-weight: 600; }
.scorer-row .delta.down { color: var(--red-700); font-weight: 600; }
.scorer-row .delta.flat { color: var(--text-muted); }

.trends-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
@media (max-width: 760px) { .trends-strip { grid-template-columns: repeat(2, 1fr); } }
.trend-card { padding: 24px; background: var(--flowx-surface-primary); border: none; border-radius: var(--flowx-radius-12); box-shadow: var(--flowx-shadow-xs); }
.trend-card h5 { margin: 0; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
.trend-card .val { font-size: 16px; font-weight: 700; color: var(--text); margin-top: 2px; }
.spark { height: 24px; margin-top: 4px; width: 100%; }

/* ============ INSTANCES (placeholder until Task 4) ============ */
.type-cell { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-size: 11px; }
.type-cell.proc { color: var(--green-700); }
.type-cell.uiflow { color: var(--purple-700); }
.type-badge {
  width: 18px; height: 18px; border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; color: white; font-weight: 700;
}
.type-cell.proc .type-badge { background: var(--green-500); }
.type-cell.uiflow .type-badge { background: var(--purple-500); }

/* ============ GLOSSARY PANEL ============ */
.glossary-panel {
  position: fixed;
  top: 56px; right: 0; bottom: 0;
  width: 420px;
  background: var(--bg);
  border-left: 1px solid var(--border);
  box-shadow: var(--shadow-l);
  transform: translateX(100%);
  transition: transform 250ms cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 102;
  display: flex;
  flex-direction: column;
}
.glossary-panel.open { transform: translateX(0); }
.glossary-panel .head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.glossary-panel .head h3 { margin: 0; font-size: 18px; line-height: 28px; font-weight: 700; }
.glossary-panel .head .sub { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
.glossary-panel .search-row { padding: 10px 18px; border-bottom: 1px solid var(--border); }
.glossary-panel .search-row input {
  width: 100%;
  height: 28px;
  padding: 0 8px;
  border: 1px solid var(--flowx-border-default);
  border-radius: var(--flowx-radius-8);
  font: inherit;
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-text-primary);
  outline: none;
  transition: border-color 100ms ease;
}
.glossary-panel .search-row input:hover { border-color: var(--flowx-border-strong); }
.glossary-panel .search-row input:focus { border-color: var(--flowx-blue-500); }
.glossary-panel .body { overflow-y: auto; flex: 1; padding: 14px 18px; }
.glossary-term { margin-bottom: 16px; }
.glossary-term h4 { margin: 0 0 4px; font-size: 13px; font-weight: 700; color: var(--text); }
.glossary-term p { margin: 0; font-size: 12px; line-height: 18px; color: var(--text-muted); }

/* ============ HELP POPOVER ============ */
.help-popover {
  position: fixed;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-m);
  padding: 12px 14px;
  font-size: 12px;
  max-width: 280px;
  z-index: 200;
  display: none;
  pointer-events: auto;
}
.help-popover.open { display: block; }
.help-popover h5 { margin: 0 0 6px; font-size: 12px; font-weight: 700; color: var(--text); }
.help-popover p { margin: 0 0 6px; color: var(--text-muted); line-height: 18px; }
.help-popover a {
  display: inline-block;
  color: var(--blue-500);
  font-weight: 600;
  font-size: 11px;
  text-decoration: none;
  cursor: pointer;
}

/* ============ DETAIL PANEL — embedded slices ============ */
.le-slice {
  background: var(--purple-50);
  border: 1px solid var(--purple-100);
  border-radius: 8px;
  padding: 10px 12px;
}
.le-slice .head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--purple-700);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
.le-slice .head a {
  text-transform: none;
  letter-spacing: 0;
  font-weight: 600;
  font-size: 11px;
  color: var(--purple-500);
  cursor: pointer;
}
.le-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  font-size: 12px;
  border-bottom: 1px solid var(--purple-100);
}
.le-row:last-child { border-bottom: none; }
.le-row .icon {
  width: 24px; height: 24px;
  border-radius: var(--flowx-radius-6);
  background: var(--purple-500);
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.le-row .name { color: var(--text); }
.le-row .name small { display: block; color: var(--text-muted); font-size: 10px; }
.le-row .scorer { font-size: 11px; color: var(--purple-700); }
.le-row .scorer.bad { color: var(--red-700); font-weight: 600; }
.le-row .when { font-size: 11px; color: var(--text-dim); }

/* Tree (Activity tree) */
.tree-node {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 4px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
}
.tree-node .lbl { color: var(--text); flex: 1; }
.tree-node .pos { font-size: 11px; color: var(--text-muted); }
.tree-node.bad { background: var(--red-50); border-color: var(--red-100); }
.tree-node.bad .pos { color: var(--red-700); }
.tree-child {
  margin-left: 24px;
  position: relative;
}
.tree-child::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 14px;
  width: 8px;
  height: 1px;
  background: var(--border-strong);
}
.related-card .ic { border-radius: var(--flowx-radius-6); }
.feed-row .glyph { border-radius: var(--flowx-radius-6); }

/* Spawn anchor inline indicator */
.spawn-anchor {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--yellow-700);
  text-decoration: none;
  cursor: pointer;
}

/* Tabs/stage tabs (used by Incidents) */
.stage-tabs {
  display: flex;
  background: var(--flowx-surface-primary);
  border-bottom: 1px solid var(--flowx-neutrals-100);
  padding: 0 24px;
}
.stage-tab {
  padding: 8px 12px;
  font-size: 12px;
  line-height: 16px;
  color: var(--flowx-neutrals-500);
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 100ms ease, background 100ms ease;
}
.stage-tab:hover { color: var(--flowx-text-primary); }
.stage-tab.active {
  color: var(--flowx-blue-500);
  font-weight: 600;
  border-bottom-color: var(--flowx-blue-500);
  background: var(--flowx-surface-primary);
}
.stage-tab .count {
  font-size: 10px;
  line-height: 12px;
  padding: 1px 6px;
  border-radius: var(--flowx-radius-pill);
  background: var(--flowx-neutrals-100);
  color: var(--flowx-neutrals-500);
  font-weight: 600;
}
.stage-tab.active .count { background: var(--flowx-blue-500); color: var(--flowx-white); }
.stage-tab .count.alert { background: var(--flowx-red-50); color: var(--flowx-red-700); }
.stage-tab .count.warn  { background: var(--flowx-orange-50); color: var(--flowx-orange-700); }

/* Severity bands (Incidents) */
.inc-row {
  display: grid;
  grid-template-columns: 8px 1fr 120px 150px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;

/* FlowX Switch (small): track 28x16 r20 · ON blue-500 + white knob 12x12 · OFF white + neutrals-200 stroke + neutrals-500 knob 10x10 */
.toggle .switch {
  width: 28px; height: 16px;

  border-radius: 20px;
  position: relative;
  transition: background 150ms ease, border-color 150ms ease;
  border: 1.5px solid transparent;
}
.toggle .switch::after {
  content: '';
  position: absolute;
  top: 50%; left: calc(100% - 14px);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--flowx-white);
  transform: translateY(-50%);
  transition: left 150ms ease, width 150ms ease, height 150ms ease, background 150ms ease;
}
.toggle.off .switch {
  background: var(--flowx-white);
  border-color: var(--flowx-neutrals-200);

.toggle.off .switch::after {

let prevBadges = {};

function renderBadge(item) {
  if (!item.badge) return '';
  const b = item.badge();
  if (!b || (!b.value && b.value !== 0)) return '';
  // Hide '0' for alert badges
  if (b.kind === 'alert' && b.value === 0) return '';
  return `<span class="nav-badge ${b.kind}">${b.value}</span>`;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const route = STATE.currentRoute;
  const baseRoute = STATE.currentRouteBase || route;
  const cnt = liveCounters();
  let html = '';
  NAV.forEach(entry => {
    const isParentWithChildren = entry.children && entry.children.length > 0;
    const parentActive = !isParentWithChildren && baseRoute === entry.id;
    const parentClickable = !!entry.route;
    const parentClick = parentClickable ? `onclick="location.hash='${entry.route}'"` : '';
    html += `<button class="nav-parent ${parentClickable ? '' : 'no-route'} ${parentActive ? 'parent-active' : ''}" ${parentClick}>
      <span class="content">
        <span class="glyph"><i class="ph ph-${entry.glyph}"></i></span>
        <span class="label">${entry.label}</span>
      </span>
      ${renderBadge(entry)}
    </button>`;
    if (isParentWithChildren) {
      html += `<div class="nav-children">`;
      entry.children.forEach(child => {
        const active = baseRoute === child.id;
        html += `<button class="nav-child ${active ? 'active' : ''}" onclick="location.hash='${child.route}'">
          <span class="label">${child.label}</span>
          ${renderBadge(child)}
        </button>`;
      });
      html += `</div>`;
    }
  });
  // footer
  const footerHealthy = cnt.openIncidentCount === 0;
  html += `<div class="nav-bottom">
    <div class="nav-help ${footerHealthy ? '' : 'alert'}">
      <span class="dot"></span>
      <span class="text">${footerHealthy ? 'All systems active' : `${cnt.openIncidentCount} incident${cnt.openIncidentCount === 1 ? '' : 's'} open`}</span>
    </div>
    <button class="nav-help" onclick="openGlossary()">
      <span style="opacity:0.6">?</span>
      <span class="text">Tour &amp; help</span>
    </button>
  </div>`;
  sb.innerHTML = html;
}

  incidents: renderIncidents,
  builds: renderBuilds,
  configuration: renderConfiguration,
  'live-evals': renderLiveEvalsLanding,
  'live-evals/runs': renderWorkflowRunsList,
  triggers: renderTriggers,
  tasks: renderTasks,
};

function router() {
  let hash = location.hash.replace(/^#\//, '');
  if (!hash) hash = 'overview';
  // Pattern: live-evals/<wfId>/builds/<leftId>/compare/<rightId> — comparison page
  const cmpMatch = hash.match(/^live-evals\/(wf_[a-z0-9_-]+)\/builds\/(b_[a-z0-9_-]+)\/compare\/(b_[a-z0-9_-]+)$/);
  if (cmpMatch) {
    const [, wfId, leftId, rightId] = cmpMatch;
    if (MOCK_DATA.workflows.some(w => w.id === wfId) && MOCK_DATA.builds.some(b => b.id === leftId) && MOCK_DATA.builds.some(b => b.id === rightId)) {
      STATE.liveEvals.workflowId = wfId;
      STATE.currentRoute = hash;
      STATE.currentRouteBase = 'live-evals';
      closeDetail();
      renderSidebar();
      document.getElementById('page').innerHTML = '';
      renderBuildComparison(document.getElementById('page'), wfId, leftId, rightId);
      window.scrollTo(0, 0);
      return;
    }
    hash = `live-evals/${wfId}`;
  }
  // Pattern: live-evals/<workflowId> — workflow detail drill-in
  const wfMatch = hash.match(/^live-evals\/(wf_[a-z0-9_-]+)$/);
  if (wfMatch) {
    const wfId = wfMatch[1];
    if (MOCK_DATA.workflows.some(w => w.id === wfId)) {
      STATE.liveEvals.workflowId = wfId;
      STATE.currentRoute = hash;
      STATE.currentRouteBase = 'live-evals';
      closeDetail();
      renderSidebar();
      document.getElementById('page').innerHTML = '';
      renderLiveEvalsWorkflow(document.getElementById('page'));
      window.scrollTo(0, 0);
      return;
    }
    // Unknown workflow id — fall through to landing
    hash = 'live-evals';
  }
  if (!ROUTES[hash]) hash = 'overview';
  STATE.currentRoute = hash;
  STATE.currentRouteBase = hash.split('/')[0];
  // Close detail panel on route change
  closeDetail();
  renderSidebar();
  const renderer = ROUTES[hash];
  document.getElementById('page').innerHTML = '';
  renderer(document.getElementById('page'));
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', router);

// ============================================================
//  HELPERS

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function md(s) {
  // Tiny inline markdown for **bold** and *italic*, plus our custom {pill}…/{code}…/{mono}…/{link}… token expansion
  if (!s) return '';
  let out = escapeHtml(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return out;
}
function inlineParts(parts) {
  // Renders subline parts where some are tagged: {pill}xxx, {code}xxx, {mono}xxx, {link}xxx
  return parts.map(p => {
    const m = p.match(/^\{(pill|code|mono|link)\}(.+)$/);
    if (!m) return md(p);
    const kind = m[1], v = escapeHtml(m[2]);
    if (kind === 'pill') return `<span class="pill">${v}</span>`;
    if (kind === 'code') return `<code style="font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);border:1px solid var(--border);padding:1px 5px;border-radius:4px;">${v}</code>`;
    if (kind === 'mono') return `<code style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);">${v}</code>`;
    if (kind === 'link') return `<a style="color:var(--blue-500);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:10px;text-decoration:none;cursor:pointer;">${v}</a>`;
    return v;
  }).join(' · ');
}
function statePill(state, rawState, rawDesc) {
  const labels = { running: 'Running', waiting: 'Waiting', completed: 'Completed', failed: 'Failed', terminated: 'Terminated' };
  const tip = rawState ? `${rawState} · ${rawDesc || ''}` : labels[state];
  return `<span class="state-pill state-${state}" data-tip="${escapeHtml(tip)}"><span class="dot"></span>${labels[state]}</span>`;
}
function buildChip(tag) {
  return `<span class="build-chip">${escapeHtml(tag)}</span>`;
}
function helpIcon(term) {
  return `<span class="help-icon-inline" onclick="showHelpPopover(event, '${escapeHtml(term)}')">?</span>`;
}
function panelHeading(label, term) {
  return `<h4>${escapeHtml(label)}${term ? helpIcon(term) : ''}</h4>`;
}

function expandTokens(s) {

  if (!s) return '';

    .replace(/\{pill\}(\S+)/g, '<span class="pill">$1</span>')
    .replace(/\{mono\}(\S+)/g, '<code style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--text-muted);">$1</code>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>');
}

function addRole(role) {
  if (!role) return;
  if (!STATE.configResolver.roles.includes(role)) STATE.configResolver.roles.push(role);
  renderConfiguration(document.getElementById('page'));
}
function removeRole(role) {
  STATE.configResolver.roles = STATE.configResolver.roles.filter(r => r !== role);
  renderConfiguration(document.getElementById('page'));
}
function toggleOverride(axis, id) {
  const list = axis === 'build' ? MOCK_DATA.policies.build.overrides : MOCK_DATA.policies.param.overrides;
  const o = list.find(x => x.id === id);
  if (o) o.enabled = !o.enabled;
  // Re-resolve if there was a previous result
  if (STATE.configResolver.result) resolveConfig();
  else renderConfiguration(document.getElementById('page'));
}

function resolveConfig() {
  const { username, roles } = STATE.configResolver;
  const policy = MOCK_DATA.policies.build;
  const params = MOCK_DATA.policies.param;

  // Build axis resolution
  const overridesSorted = policy.overrides.slice().sort((a, b) => b.priority - a.priority);
  const buildPath = [];
  let buildMatch = null;
  for (const o of overridesSorted) {
    const matchesTarget = o.target.type === 'USER' ? o.target.value === username : roles.includes(o.target.value);
    if (!o.enabled) {
      buildPath.push({ description: `${o.target.type} override ${o.target.value} · priority ${o.priority} — disabled`, matched: false });
      continue;
    }
    if (matchesTarget) {
      if (buildMatch === null) {
        buildPath.push({ description: `${o.target.type} override ${o.target.value} matched · priority ${o.priority}`, matched: true });
        buildMatch = o;
      } else {
        buildPath.push({ description: `${o.target.type} override ${o.target.value} priority ${o.priority} — lower than winning rule`, matched: false });
      }
    } else {
      buildPath.push({ description: `${o.target.type} override ${o.target.value} priority ${o.priority} — does not match`, matched: false });
    }
  }
  if (buildMatch) {
    buildPath.push({ description: 'Default policy — not reached', matched: false });
  } else {
    buildPath.push({ description: `Default policy applied → ${policy.default.resolvesToTag}`, matched: true });
  }
  const buildResult = buildMatch
    ? { resolvesToTag: buildMatch.policy.resolvesToTag, source: 'override', via: buildMatch.target.type, viaTarget: buildMatch.target.value, viaPriority: buildMatch.priority, resolutionPath: buildPath }
    : { resolvesToTag: policy.default.resolvesToTag, source: 'default', resolutionPath: buildPath };

  // Param axis resolution — per key
  const paramOverridesSorted = params.overrides.slice().sort((a, b) => b.priority - a.priority);
  const resolvedParams = {};
  for (const [key, defaultValue] of Object.entries(params.defaults)) {
    let winner = null;
    let suppressedHigherEnabled = false;
    let suppressedHigherDisabled = null;
    for (const o of paramOverridesSorted) {
      const matches = o.target.type === 'USER' ? o.target.value === username : roles.includes(o.target.value);
      if (!matches) continue;
      if (key in o.params) {
        if (o.enabled && !winner) {
          winner = o;
        } else if (!o.enabled && !winner && !suppressedHigherDisabled) {
          suppressedHigherDisabled = o;
        }
      }
    }
    if (winner) {
      resolvedParams[key] = {
        value: winner.params[key],
        source: 'override',
        via: winner.target.type,
        viaTarget: winner.target.value,
        viaPriority: winner.priority,
        note: suppressedHigherDisabled ? `${suppressedHigherDisabled.target.value} override would also match but is OFF` : null,
      };
    } else {
      resolvedParams[key] = {
        value: defaultValue,
        source: 'default',
        note: suppressedHigherDisabled ? `${suppressedHigherDisabled.target.value} override would set ${suppressedHigherDisabled.params[key]} but is OFF` : null,
      };
    }
  }

  STATE.configResolver.result = { build: buildResult, params: resolvedParams };
  renderConfiguration(document.getElementById('page'));
}

// Live Evals — scorer time-series chart
function timeWindowHours(tw) {
  return { '1h': 1, '24h': 24, '7d': 168 }[tw] || 24;
}

function generateScorerSeries(scorer, hoursWindow) {
  // 30 evenly-spaced samples; oscillates around a baseline; if breached, regresses in the most-recent ~15% of the window
  const points = 30;
  const baseline = scorer.breached ? scorer.threshold + 0.10 : scorer.value;
  const amplitude = scorer.threshold < 0.5 ? 0.005 : 0.025;
  const series = [];
  for (let i = 0; i < points; i++) {
    const t = hoursWindow * (1 - i / (points - 1));
    let v = baseline + Math.sin(i * 0.45 + (scorer.name.length || 0)) * amplitude;
    if (scorer.breached && t < hoursWindow * 0.15) {
      const dropFactor = 1 - t / (hoursWindow * 0.15);
      const targetDrop = scorer.threshold < 0.5
        ? (scorer.value - baseline)
        : -(baseline - scorer.value);
      v = baseline + dropFactor * targetDrop * 1.05;
    }
    series.push({ t, v });
  }
  return series;
}

function renderScorerChart(scorer, hoursWindow, builds) {
  const W = 540, H = 96, padL = 36, padR = 60, padT = 12, padB = 18;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const series = generateScorerSeries(scorer, hoursWindow);
  const values = series.map(s => s.v).concat([scorer.threshold]);
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const pad = (maxV - minV) * 0.15 || 0.05;
  const yMin = Math.max(0, minV - pad);
  const yMax = Math.min(scorer.threshold < 0.5 ? 0.3 : 1, maxV + pad);
  const x = (t) => padL + (1 - t / hoursWindow) * innerW;
  const y = (v) => padT + (1 - (v - yMin) / (yMax - yMin || 1)) * innerH;
  const pathD = series.map((s, i) => `${i === 0 ? 'M' : 'L'} ${x(s.t).toFixed(1)},${y(s.v).toFixed(1)}`).join(' ');
  const areaD = `${pathD} L ${x(series[series.length - 1].t).toFixed(1)},${(padT + innerH).toFixed(1)} L ${x(series[0].t).toFixed(1)},${(padT + innerH).toFixed(1)} Z`;
  const thresholdY = y(scorer.threshold);
  const markers = builds.filter(b => b.cutAtHours <= hoursWindow).map(b => ({
    x: x(b.cutAtHours),
    color: b.isActive ? 'var(--blue-500)' : 'var(--text-dim)',
    label: b.tag,
  }));
  const lineColor = scorer.breached ? 'var(--red-500)' : 'var(--green-500)';
  const fillColor = scorer.breached ? 'var(--red-50)' : 'var(--green-50)';
  const windowLabel = { 1: '1h', 24: '24h', 168: '7d' }[hoursWindow] || `${hoursWindow}h`;

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;width:100%;height:96px;">
    <rect x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="var(--bg-alt)" rx="3" />
    <text x="${padL - 4}" y="${y(yMax) + 3}" text-anchor="end" font-size="9" fill="var(--text-dim)">${yMax.toFixed(2)}</text>
    <text x="${padL - 4}" y="${y(yMin) + 3}" text-anchor="end" font-size="9" fill="var(--text-dim)">${yMin.toFixed(2)}</text>
    ${markers.map(m => `
      <line x1="${m.x.toFixed(1)}" y1="${padT}" x2="${m.x.toFixed(1)}" y2="${padT + innerH}" stroke="${m.color}" stroke-width="1" stroke-dasharray="2 2" opacity="0.55" />
      <text x="${m.x + 3}" y="${padT + 9}" font-size="8" fill="${m.color}" font-weight="700">${escapeHtml(m.label)}</text>
    `).join('')}
    <line x1="${padL}" y1="${thresholdY.toFixed(1)}" x2="${padL + innerW}" y2="${thresholdY.toFixed(1)}" stroke="var(--orange-500)" stroke-width="1" stroke-dasharray="3 3" />
    <text x="${padL + innerW + 4}" y="${thresholdY + 3}" font-size="9" fill="var(--orange-700)" font-weight="600">thr ${scorer.threshold.toFixed(2)}</text>
    <path d="${areaD}" fill="${fillColor}" opacity="0.6" />
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="1.5" />
    <circle cx="${x(series[series.length-1].t).toFixed(1)}" cy="${y(series[series.length-1].v).toFixed(1)}" r="2.5" fill="${lineColor}" />
    <text x="${padL}" y="${H - 4}" font-size="9" fill="var(--text-dim)">${windowLabel} ago</text>
    <text x="${padL + innerW}" y="${H - 4}" text-anchor="end" font-size="9" fill="var(--text-dim)">now</text>
    <text x="${padL + innerW + 4}" y="${y(series[series.length-1].v).toFixed(1)}" font-size="11" fill="${lineColor}" font-weight="700">${series[series.length-1].v.toFixed(2)}</text>
  </svg>`;
}
